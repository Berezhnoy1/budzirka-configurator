<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUDZIRKA · Комерційна пропозиція</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23274C4F'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#274C4F; --brand-2:#456A6D; --ink:#152420; --ink-soft:#3c4a46; --ink-mut:#5f6f6a;
  --surface:#EEF4F5; --surface-2:#E2EDEF; --white:#fff; --border:#dbe6e6; --border-2:#cddbdb;
  --shadow:0 2px 6px rgba(21,36,32,.06),0 14px 34px rgba(21,36,32,.10); --shadow-lg:0 24px 70px rgba(21,36,32,.16);
  --r:16px; --r-sm:11px; --r-pill:100px; --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
  background:radial-gradient(125% 100% at 50% 0%, #ffffff 0%, #f1f6f7 55%, #e2edf0 100%);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:840px;margin:0 auto;padding:22px 16px 60px}

.tools{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
.tools .brand{display:flex;align-items:center;gap:10px}
.tools .brand .mark{width:34px;height:34px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px;box-shadow:var(--shadow)}
.tools .brand b{font-size:16px;letter-spacing:.4px}
.btn{border:1.5px solid var(--brand);background:var(--brand);color:#fff;padding:12px 20px;border-radius:var(--r-pill);font-size:14.5px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:8px;min-height:46px}
.btn:hover{background:var(--brand-2);border-color:var(--brand-2)}

.quote{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);overflow:hidden}
.qbar{background:var(--brand);color:#fff;padding:26px 34px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:4px solid var(--brand-2)}
.qbar .co b{font-size:23px;letter-spacing:.6px}
.qbar .co div{font-size:12.5px;color:#cfe0e1;margin-top:3px}
.qbar .qn{text-align:right;font-size:13px;color:#dfeaea}
.qbar .qn b{font-size:16px;color:#fff;display:block;margin-bottom:2px}
.qbody{padding:30px 34px 36px}
.qmeta{font-size:13.5px;color:var(--ink-soft);margin-bottom:20px;line-height:1.75}
.qmeta b{color:var(--ink)}
table{width:100%;border-collapse:collapse;margin:6px 0 16px;font-size:13.5px;font-variant-numeric:tabular-nums}
th{text-align:left;border-bottom:2px solid var(--ink);padding:9px 7px;font-weight:600}
td{padding:11px 7px;border-bottom:1px solid var(--surface-2);vertical-align:top}
td.r,th.r{text-align:right;white-space:nowrap}
tfoot td{border:none;font-weight:700}
.meta{color:var(--ink-soft);font-size:12.5px;white-space:pre-line}
.qsk{max-width:360px;margin:10px 0 2px}
.qsk svg{width:100%;height:auto;display:block}
.qtot{text-align:right;font-size:25px;font-weight:800;margin-top:8px;letter-spacing:-.4px}
.quah{text-align:right;font-size:13px;color:var(--ink-mut);margin-top:2px}
.qterms{margin-top:24px;font-size:12px;color:var(--ink-mut);border-top:1px solid var(--surface-2);padding-top:15px;line-height:1.65}
.trust{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.trust span{background:var(--surface);border-radius:99px;padding:4px 12px;font-size:11.5px;color:var(--ink-soft);font-weight:600}

.state{max-width:520px;margin:60px auto;text-align:center;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 28px}
.state .mk{width:54px;height:54px;border-radius:14px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:26px;margin:0 auto 16px}
.state h2{margin:0 0 6px;font-size:20px}.state p{color:var(--ink-mut);font-size:14px;margin:0}
.spin{width:30px;height:30px;border:3px solid var(--surface-2);border-top-color:var(--brand);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}

@media (max-width:680px){
  .wrap{padding:14px 10px 40px}
  .qbar{flex-direction:column;gap:10px;padding:18px 18px}
  .qbar .qn{text-align:left}
  .qbody{padding:18px 16px 26px}
  .qtot{font-size:21px}
  table,thead,tbody,tr,td,tfoot{display:block;width:auto}
  thead{display:none}
  tr{border-bottom:1px solid var(--surface-2);padding:10px 0}
  td{border:none;padding:2px 0;display:flex;justify-content:space-between;gap:14px}
  td:first-child{display:none}
  td[data-l]::before{content:attr(data-l);color:var(--ink-mut);font-size:12px}
  .qsk{max-width:100%}
}
@media print{
  .tools{display:none!important}
  body{background:#fff}
  .wrap{padding:0;max-width:none}
  .quote{border:none;box-shadow:none;border-radius:0}
  .qbar{-webkit-print-color-adjust:exact;print-color-adjust:exact;flex-direction:row}
  table,thead,tbody,tfoot,tr,td,th{display:revert}
  thead{display:table-header-group}
  td:first-child{display:table-cell}
  td[data-l]::before{content:none}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="tools no-print">
    <div class="brand"><div class="mark">B</div><b>BUDZIRKA</b></div>
    <button class="btn" id="printBtn" style="display:none">🖨 Друк / Зберегти PDF</button>
  </div>
  <div id="out">
    <div class="state"><div class="spin"></div><p style="margin-top:16px">Завантажуємо пропозицію…</p></div>
  </div>
</div>

<script>
const SB='https://eymmfzpcuuibufondxfv.supabase.co/rest/v1/rpc/kp_view';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5bW1menBjdXVpYnVmb25keGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjM0ODMsImV4cCI6MjA5MzYzOTQ4M30.4LqMeLcuCGRBaXcEQJI6T0B01LpL_zTXghdIbV2JY9E';
const out=document.getElementById('out');
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function money2(n){ return Number(n||0).toLocaleString('uk-UA',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function fail(t){ out.innerHTML='<div class="state"><div class="mk">!</div><h2>'+esc(t)+'</h2><p>Перевірте посилання або зверніться до менеджера BUDZIRKA.</p></div>'; }

function getId(){
  const q=new URLSearchParams(location.search); let id=q.get('id')||'';
  if(!id && location.hash) id=new URLSearchParams(location.hash.replace(/^#/,'')).get('id')||location.hash.replace(/^#/,'');
  return (id||'').trim();
}
async function load(){
  const id=getId();
  if(!id){ fail('Немає ідентифікатора КП'); return; }
  let res;
  try{
    const r=await fetch(SB,{method:'POST',headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},body:JSON.stringify({p_id:id})});
    res=await r.json();
  }catch(e){ fail('Помилка зʼєднання'); return; }
  if(!res || !res.ok){ fail('КП не знайдено'); return; }
  render(res);
}
function render(d){
  const rate=+d.eur_uah||0;
  const est=Array.isArray(d.estimate)?d.estimate:[];
  const date=d.created_at?new Date(d.created_at).toLocaleDateString('uk-UA'):'';
  const num=d.quote_number||'КП';
  const lineSum=est.reduce((a,it)=>a+(+it.unitBase||0)*(+it.qty||1),0);
  const total=+d.total_eur||lineSum;
  const discount=Math.max(0, Math.round((lineSum-total)*100)/100);
  const rows=est.map((it,i)=>`<tr>
    <td>${i+1}</td>
    <td><b>${esc(it.title)}</b><br><span class="meta">${esc(it.meta)}</span>${it.sketch?`<div class="qsk">${it.sketch}</div>`:''}</td>
    <td class="r" data-l="К-сть">${esc(it.qty||1)}</td>
    <td class="r" data-l="Ціна">${money2(it.unitBase)}</td>
    <td class="r" data-l="Сума">${money2((+it.unitBase||0)*(+it.qty||1))}</td></tr>`).join('');
  const link=[d.via_messenger?'месенджери (Telegram/Viber)':'', d.no_call?'просив не дзвонити':''].filter(Boolean).join(' · ');
  out.innerHTML=`<div class="quote">
    <div class="qbar">
      <div class="co"><b>BUDZIRKA</b><div>Постачаємо, оброблюємо та монтуємо</div><div>budzirka.com.ua</div></div>
      <div class="qn"><b>${esc(num)}</b>${date}</div>
    </div>
    <div class="qbody">
      <div class="qmeta">
        <b>Клієнт:</b> ${esc(((d.name||'')+' '+(d.surname||'')).trim()||'—')}${d.company?' · '+esc(d.company):''}<br>
        <b>Телефон:</b> ${esc(d.phone||'—')}${d.email?' · <b>Email:</b> '+esc(d.email):''}<br>
        <b>Цінова категорія:</b> ${esc(d.price_cat||'—')}${d.comment?'<br><b>Коментар:</b> '+esc(d.comment):''}
        ${link?'<br><b>Звʼязок:</b> '+esc(link):''}
      </div>
      <table>
        <thead><tr><th>№</th><th>Найменування / конфігурація</th><th class="r">К-сть</th><th class="r">Ціна</th><th class="r">Сума</th></tr></thead>
        <tbody>${rows}</tbody>
        ${discount>0?`<tfoot><tr><td colspan="4" class="r">Знижка (${esc(d.price_cat||'')})</td><td class="r">−${money2(discount)}</td></tr></tfoot>`:''}
      </table>
      <div class="qtot">Разом: ${money2(total)}</div>
      <div class="quah">≈ ${Math.round(total*rate).toLocaleString('uk-UA')} грн за курсом НБУ ${rate} грн/€</div>
      <div class="trust"><span>Авторизований партнер Fundermax</span><span>100% водостійкий HPL</span><span>Монтаж по Україні</span></div>
      <div class="qterms">
        Пропозиція дійсна 14 днів з дати формування. Ціни попередні, потребують підтвердження менеджером після перевірки наявності матеріалів на складі. Не є публічною офертою.
      </div>
    </div>
  </div>`;
  const b=document.getElementById('printBtn'); b.style.display=''; b.onclick=()=>window.print();
  document.title='BUDZIRKA · '+num;
}
load();
</script>
</body>
</html>

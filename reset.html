<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BUDZIRKA · Зміна PIN</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23274C4F'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--brand:#274C4F;--brand-2:#456A6D;--ink:#152420;--ink-mut:#5f6f6a;--surface:#EEF4F5;--border:#dbe6e6;--brand-soft:#e6f0f0;--err:#a5471f;--ok:#2e7d5b}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(125% 100% at 50% 0%,#fff,#f1f6f7 55%,#e2edf0)}
.card{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 24px 70px rgba(21,36,32,.14);max-width:420px;width:100%;padding:30px}
.mark{width:46px;height:46px;border-radius:12px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:24px;margin-bottom:16px}
h1{font-size:22px;margin:0 0 6px}p{color:var(--ink-mut);font-size:14px;line-height:1.55;margin:0 0 18px}
label{display:block;font-size:12.5px;font-weight:600;margin:0 0 6px}
input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:16px;letter-spacing:.2em;text-align:center}
input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
button{width:100%;margin-top:16px;border:none;background:var(--brand);color:#fff;border-radius:100px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
button:hover{background:var(--brand-2)}button:disabled{background:#cdd;cursor:not-allowed}
.msg{margin-top:14px;font-size:13px;border-radius:10px;padding:11px 13px;display:none}
.msg.err{display:block;background:#f7e8e0;color:var(--err)}
.msg.ok{display:block;background:#e4f2ea;color:var(--ok)}
a{color:var(--brand-2)}
</style>
</head>
<body>
<div class="card">
  <div class="mark">B</div>
  <h1>Зміна PIN-коду</h1>
  <p id="lead">Введіть новий 6-значний PIN для вашого акаунта BUDZIRKA.</p>
  <div id="form">
    <label>Новий PIN (6 цифр)</label>
    <input id="pin" inputmode="numeric" maxlength="6" placeholder="••••••" autocomplete="off">
    <button id="go">Зберегти новий PIN</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
const SBR='https://eymmfzpcuuibufondxfv.supabase.co/rest/v1';
const SBKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5bW1menBjdXVpYnVmb25keGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjM0ODMsImV4cCI6MjA5MzYzOTQ4M30.4LqMeLcuCGRBaXcEQJI6T0B01LpL_zTXghdIbV2JY9E';
const q=new URLSearchParams(location.search), email=q.get('email')||'', token=q.get('token')||'';
const msg=document.getElementById('msg'), go=document.getElementById('go');
function show(t,cls){ msg.className='msg '+cls; msg.textContent=t; }
if(!email||!token){ document.getElementById('form').style.display='none'; show('Посилання неповне або застаріле. Запросіть нове в особистому кабінеті.','err'); }
go.onclick=async()=>{
  const pin=(document.getElementById('pin').value||'').replace(/\D/g,'');
  if(pin.length!==6){ show('PIN має складатися рівно з 6 цифр.','err'); return; }
  go.disabled=true; go.textContent='Збереження…';
  try{
    const r=await fetch(SBR+'/rpc/cust_reset_pin',{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SBKEY,'Authorization':'Bearer '+SBKEY},
      body:JSON.stringify({p_email:email,p_token:token,p_new_pin:pin})});
    const res=await r.json();
    if(res&&res.ok){ document.getElementById('form').style.display='none';
      show('PIN змінено ✓ Тепер ви можете увійти в конфігураторі за email і новим PIN.','ok'); }
    else show('Посилання застаріло або вже використане. Запросіть нове в особистому кабінеті.','err');
  }catch(e){ show('Помилка зʼєднання. Спробуйте ще раз.','err'); }
  go.disabled=false; go.textContent='Зберегти новий PIN';
};
document.getElementById('pin').addEventListener('keydown',e=>{ if(e.key==='Enter') go.click(); });
</script>
</body>
</html>

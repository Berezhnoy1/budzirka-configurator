<style>
:root{
  --brand:#274C4F; --brand-2:#456A6D; --ink:#152420; --ink-soft:#3c4a46; --ink-mut:#5f6f6a;
  --bg:#FBFCFC; --surface:#EEF4F5; --surface-2:#E2EDEF; --white:#fff; --border:#dbe6e6; --border-2:#cddbdb;
  --brand-soft:#e6f0f0; --ok:#2e7d5b; --ok-soft:#e4f2ea;
  --shadow:0 2px 6px rgba(21,36,32,.06),0 14px 34px rgba(21,36,32,.10);
  --shadow-lg:0 24px 70px rgba(21,36,32,.18);
  --r:16px; --r-sm:11px; --r-pill:100px;
  --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--ink);
  background:radial-gradient(125% 100% at 50% 0%, #ffffff 0%, #f1f6f7 55%, #e2edf0 100%)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
#stage{position:fixed;inset:0}
#stage canvas{display:block;touch-action:none}
#labels{position:fixed;inset:0;pointer-events:none;z-index:4;overflow:hidden}

.ov{position:fixed;z-index:5;pointer-events:none}
.ov > *{pointer-events:auto}
.brandbar{top:0;left:0;right:0;display:flex;align-items:center;gap:11px;padding:16px 20px}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:17px;box-shadow:var(--shadow)}
.logo b{font-size:17px;letter-spacing:.5px}
.logo span{color:var(--ink-mut);font-size:13px;margin-left:2px}
.brandbar .spacer{flex:1}

/* spec card — суцільна біла */
.spec{top:74px;left:20px;width:296px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);
  box-shadow:var(--shadow-lg);padding:20px 20px 16px;animation:slideIn .6s cubic-bezier(.2,.7,.3,1) both}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.spec .plabel{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut);font-weight:700}
.spec h2{margin:5px 0 14px;font-size:20px;letter-spacing:-.3px}
.spec .decor{display:flex;align-items:center;gap:11px;margin-bottom:15px}
.spec .decor .sw{width:44px;height:44px;border-radius:11px;border:1px solid rgba(0,0,0,.1);flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);transition:background .25s}
.spec .decor .dn b{font-size:15px;display:block}
.spec .decor .dn span{font-size:12px;color:var(--ink-soft)}
.spec .rows{display:flex;flex-direction:column;gap:8px;border-top:1px dashed var(--border-2);padding-top:13px}
.spec .rw{display:flex;justify-content:space-between;font-size:13px;gap:12px}
.spec .rw span:first-child{color:var(--ink-soft)}
.spec .rw span:last-child{font-weight:600;font-variant-numeric:tabular-nums}
.spec .price{margin-top:15px;background:var(--brand);color:#fff;border-radius:var(--r-sm);padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.spec .price small{font-size:11px;color:#cfe0e1;text-transform:uppercase;letter-spacing:.5px}
.spec .price .pv{text-align:right}
.spec .price .pv b{font-size:22px;font-weight:800;letter-spacing:-.5px;font-variant-numeric:tabular-nums;display:block}
.spec .price .pv span{font-size:11.5px;color:#cfe0e1}

/* decor quick-switch */
.decorrow{bottom:84px;left:50%;transform:translateX(-50%);display:flex;gap:8px;max-width:min(92vw,660px);overflow-x:auto;padding:5px;scrollbar-width:none}
.decorrow::-webkit-scrollbar{display:none}
.dchip{display:flex;align-items:center;gap:8px;flex:0 0 auto;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1.5px solid var(--border);border-radius:var(--r-pill);padding:6px 14px 6px 6px;font-size:12.5px;font-weight:600;color:var(--ink-soft);transition:.14s;box-shadow:var(--shadow)}
.dchip .dot{width:26px;height:26px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);flex:0 0 auto}
.dchip:hover{border-color:var(--brand-2)}
.dchip.sel{background:var(--brand);border-color:var(--brand);color:#fff}

/* control bar — скло */
.controls{bottom:22px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:var(--r-pill);box-shadow:var(--shadow);padding:7px}
.cbtn{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:var(--ink-soft);transition:.14s;position:relative}
.cbtn:hover{background:var(--brand-soft);color:var(--brand)}
.cbtn.on{background:var(--brand);color:#fff}
.cbtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.cbtn .tip{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11.5px;padding:5px 10px;border-radius:7px;white-space:nowrap;opacity:0;transition:.15s;pointer-events:none}
.cbtn:hover .tip{opacity:1}
.cdiv{width:1px;height:26px;background:var(--border-2);margin:0 3px}

.cta{bottom:22px;right:20px;display:flex;gap:9px}
.btn{border:1.5px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(10px);color:var(--ink);padding:13px 20px;border-radius:var(--r-pill);font-size:14px;font-weight:600;transition:.15s;min-height:48px;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow);text-decoration:none}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-2);color:#fff}

.hint{bottom:138px;left:50%;transform:translateX(-50%);font-size:12.5px;color:var(--ink-mut);background:rgba(255,255,255,.7);padding:7px 15px;border-radius:var(--r-pill);transition:opacity .4s;text-align:center}

.dimlabel{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:2px 8px;font-size:11.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;white-space:nowrap}

.loader{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:var(--brand);color:#fff;transition:opacity .6s}
.loader.hide{opacity:0;pointer-events:none}
.loader .box{text-align:center}
.loader .mk{width:62px;height:62px;border-radius:17px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:31px;margin:0 auto 20px;animation:pf 1.6s ease-in-out infinite}
@keyframes pf{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.07);opacity:1}}
.loader .bar{width:184px;height:3px;border-radius:99px;background:rgba(255,255,255,.22);margin:0 auto;overflow:hidden}
.loader .bar i{display:block;height:100%;width:32%;background:#fff;border-radius:99px;animation:ld 1.15s ease-in-out infinite}
@keyframes ld{0%{margin-left:-32%}100%{margin-left:100%}}
.loader p{margin:18px 0 0;color:#cfe0e1;font-size:13.5px;letter-spacing:.3px}

@media (max-width:760px){
  .spec{top:auto;bottom:96px;left:12px;right:12px;width:auto;padding:14px 16px}
  .spec h2{font-size:18px;margin-bottom:10px}
  .spec .rows{display:none}
  .spec.open .rows{display:flex}
  .controls{bottom:14px;padding:5px;gap:3px}
  .cbtn{width:42px;height:42px}
  .cta{display:none}
  .hint{bottom:165px}
  .decorrow{bottom:150px}
  .brandbar span{display:none}
}
</style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============ конфіг ============ */
function b64urlDecode(str){
  try{ str=str.replace(/-/g,'+').replace(/_/g,'/'); const bin=atob(str);
    return JSON.parse(new TextDecoder().decode(Uint8Array.from(bin,c=>c.charCodeAt(0)))); }catch(e){ return null; }
}
const DEMO={ t:'standart', tn:'MAX Standart', kind:'каб', h:2100, d:1200, f:4000, v:'кут',
  dc:'0077', dn:'Charcoal', hex:'#4b4f52', ns:3, ws:650, ni:0, wi:900,
  fit:'нержавіюча сталь', core:'black core', price:2284, cur:'€', client:'' };
function readCfg(){ const m=(location.hash||'').match(/cfg=([^&]+)/);
  return Object.assign({}, DEMO, (m?b64urlDecode(decodeURIComponent(m[1])):null)||{}); }
const CFG=readCfg();
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;

/* декори для напрямку «кабіни» (швидка зміна) */
const DECOR_OPTIONS=[
  {code:'0085',name:'Білий',hex:'#f1efe9'},
  {code:'0074',name:'Pastel Grey',hex:'#c7c7c1'},
  {code:'0077',name:'Charcoal',hex:'#4b4f52'},
  {code:'0080',name:'Чорний',hex:'#1d1d1f'},
  {code:'5171',name:'Polar Oak',hex:'#c8a877'},
  {code:'0048',name:'Cognac Oak',hex:'#8a5a2b'},
];
if(!DECOR_OPTIONS.find(d=>d.code===CFG.dc)) DECOR_OPTIONS.unshift({code:CFG.dc,name:CFG.dn||'',hex:CFG.hex});

/* ============ аналітика ============ */
const T_URL='https://eymmfzpcuuibufondxfv.supabase.co/rest/v1/budzirka_events';
const T_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5bW1menBjdXVpYnVmb25keGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjM0ODMsImV4cCI6MjA5MzYzOTQ4M30.4LqMeLcuCGRBaXcEQJI6T0B01LpL_zTXghdIbV2JY9E';
function track(ev,props){ try{ fetch(T_URL,{method:'POST',keepalive:true,
  headers:{'Content-Type':'application/json','apikey':T_KEY,'Authorization':'Bearer '+T_KEY,'Prefer':'return=minimal'},
  body:JSON.stringify({session_id:CFG.sid||'viewer',event:'3d_'+ev,props:props||{}})}).catch(()=>{});}catch(e){} }

/* ============ сцена ============ */
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true, alpha:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

const labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(innerWidth,innerHeight);
Object.assign(labelRenderer.domElement.style,{position:'fixed',top:'0',left:'0',pointerEvents:'none'});
document.getElementById('labels').appendChild(labelRenderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.05, 200);
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

const hemi=new THREE.HemisphereLight(0xffffff,0xdfe7e8,0.85); scene.add(hemi);
const key=new THREE.DirectionalLight(0xffffff,2.1); key.position.set(4.5,7.5,5.5); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.bias=-0.0002; key.shadow.normalBias=0.02;
key.shadow.camera.near=1; key.shadow.camera.far=40;
key.shadow.camera.left=-8; key.shadow.camera.right=8; key.shadow.camera.top=8; key.shadow.camera.bottom=-8; key.shadow.camera.updateProjectionMatrix(); scene.add(key);
{ const fl=new THREE.DirectionalLight(0xffffff,0.5); fl.position.set(-6,4,-3); scene.add(fl); }
{ const rl=new THREE.DirectionalLight(0xeaf2f3,0.6); rl.position.set(-2,5,-7); scene.add(rl); }

const ground=new THREE.Mesh(new THREE.PlaneGeometry(60,60), new THREE.ShadowMaterial({opacity:0.20}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

/* ============ матеріали ============ */
const decorMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color(CFG.hex),roughness:0.62,metalness:0.0,clearcoat:0.22,clearcoatRoughness:0.45,envMapIntensity:0.7,reflectivity:0.18});
const chrome=new THREE.MeshStandardMaterial({color:0xcfd4d8,metalness:0.96,roughness:0.27,envMapIntensity:1.25});
const darkMetal=new THREE.MeshStandardMaterial({color:0x394046,metalness:0.85,roughness:0.42,envMapIntensity:1.0});
const coreEdge=new THREE.LineBasicMaterial({color:0x14181b,transparent:true,opacity:0.5});
const incMat=new THREE.MeshStandardMaterial({color:0x2c5f8a,roughness:0.5});
const colorTarget=new THREE.Color(CFG.hex);

const THICK=0.012;
function panel(w,h,d){ const g=new THREE.BoxGeometry(w,h,d); const m=new THREE.Mesh(g,decorMat);
  m.castShadow=true; m.receiveShadow=true; m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),coreEdge)); return m; }
function tube(len,r,mat,horiz){ const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,20),mat); m.castShadow=true; if(horiz) m.rotation.z=Math.PI/2; return m; }
function cabinMinW(door){ return BZ.cabinMinW(door)/1000; }   // → ../pricing.js (у метрах)
function at(o,x,y,z){ o.position.set(x,y,z); return o; }

/* ============ модель ============ */
const root=new THREE.Group(); scene.add(root);
const doorPivots=[];
let dimsGroup=null;

function buildCabins(cfg){
  const H=(cfg.h||2100)/1000, D=(cfg.d||1200)/1000, F=Math.max((cfg.f||4000)/1000,0.6);
  const sides=cfg.v==='окр'?2:cfg.v==='кут'?1:0;
  const cabs=[];
  for(let i=0;i<(cfg.ns||0);i++) cabs.push({door:cfg.ws||650,inc:false});
  for(let i=0;i<(cfg.ni||0);i++) cabs.push({door:cfg.wi||900,inc:true});
  if(!cabs.length) cabs.push({door:cfg.ws||650,inc:false});
  const n=cabs.length, mins=cabs.map(c=>cabinMinW(c.door));
  const extra=Math.max(0,(F-mins.reduce((a,b)=>a+b,0)))/n;
  const widths=mins.map(m=>m+extra), bx=[0]; widths.forEach(w=>bx.push(bx[bx.length-1]+w));
  const total=bx[bx.length-1], offX=-total/2, offZ=-D/2, X=x=>x+offX;

  const back=panel(total,H,THICK); back.position.set(X(total/2),H/2,offZ); root.add(back);

  const partAt=new Set(); for(let i=1;i<n;i++) partAt.add(i);
  if(sides>=1) partAt.add(n); if(sides>=2) partAt.add(0);
  partAt.forEach(i=>{
    const p=panel(THICK,H,D); p.position.set(X(bx[i]),H/2,offZ+D/2); root.add(p);
    [offZ+0.06,offZ+D-0.06].forEach(z=>{
      root.add(at(tube(0.085,0.013,chrome),X(bx[i]),0.043,z));
      const foot=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.034,0.018,18),chrome);
      foot.position.set(X(bx[i]),0.009,z); foot.castShadow=true; root.add(foot);
    });
  });

  cabs.forEach((c,i)=>{
    const cx=(bx[i]+bx[i+1])/2, dw=Math.min(c.door/1000,widths[i]-0.04);
    const pivot=new THREE.Group(); pivot.position.set(X(cx-dw/2), H/2, offZ+D-THICK/2);
    const door=panel(dw,H-0.02,THICK); door.position.set(dw/2,0,0); pivot.add(door);
    [-(H-0.02)/2+0.20,0,(H-0.02)/2-0.20].forEach(hy=>{
      const hg=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.085,0.03),darkMetal);
      hg.position.set(0.01,hy,0.02); hg.castShadow=true; pivot.add(hg);
    });
    const lock=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.02,20),chrome);
    lock.rotation.x=Math.PI/2; lock.position.set(dw-0.07,1.05-H/2,0.016); pivot.add(lock);
    if(c.inc){ const m=new THREE.Mesh(new THREE.CircleGeometry(0.09,28),incMat); m.position.set(dw/2,1.45-H/2,0.014); pivot.add(m); }
    root.add(pivot); doorPivots.push(pivot);
  });

  if(cfg.t==='standart'||cfg.t==='tube'||cfg.t===undefined){
    const railY=H+0.03, railZ=offZ+D-0.02;
    root.add(at(tube(total+0.16,0.016,chrome,true),X(total/2),railY,railZ));
    const posts=new Set([...partAt]); posts.add(0); posts.add(n);
    posts.forEach(i=> root.add(at(tube(0.10,0.012,chrome),X(bx[i]),H,railZ)));
  }
  buildDims(total,H,D,offZ,cfg);
  return new THREE.Box3().setFromObject(root);
}
function buildPanels(cfg){
  const H=(cfg.h||2100)/1000, pw=(cfg.pw||1000)/1000, pn=cfg.pn||3, gap=0.9;
  const total=pn*pw+(pn-1)*gap, offX=-total/2;
  for(let i=0;i<pn;i++){ const x=offX+i*(pw+gap)+pw/2;
    root.add(at(panel(pw,H,THICK),x,H/2,0));
    [-pw/2+0.08,pw/2-0.08].forEach(dx=> root.add(at(tube(0.09,0.013,chrome),x+dx,0.045,0)));
    root.add(at(tube(0.10,0.012,chrome),x,H,0));
  }
  root.add(at(tube(total+0.4,0.016,chrome,true),0,H+0.03,0));
  buildDims(total,H,0.05,-0.025,cfg);
  return new THREE.Box3().setFromObject(root);
}
function dimLabel(text,x,y,z){ const d=document.createElement('div'); d.className='dimlabel'; d.textContent=text;
  const o=new CSS2DObject(d); o.position.set(x,y,z); return o; }
function dimLine(a,b){ const g=new THREE.BufferGeometry().setFromPoints([a,b]);
  return new THREE.Line(g,new THREE.LineBasicMaterial({color:0x9fb0ab})); }
function buildDims(total,H,D,offZ,cfg){
  dimsGroup=new THREE.Group(); dimsGroup.visible=false; root.add(dimsGroup);
  const hx=total/2, fz=offZ+D, bz=offZ;
  // ширина (фасад)
  dimsGroup.add(dimLine(new THREE.Vector3(-hx,0.01,fz+0.12),new THREE.Vector3(hx,0.01,fz+0.12)));
  dimsGroup.add(dimLabel((cfg.f||Math.round(total*1000))+' мм',0,0.06,fz+0.12));
  // висота
  dimsGroup.add(dimLine(new THREE.Vector3(-hx-0.12,0,fz),new THREE.Vector3(-hx-0.12,H,fz)));
  dimsGroup.add(dimLabel((cfg.h||Math.round(H*1000))+' мм',-hx-0.12,H/2,fz));
  // глибина
  if(cfg.kind!=='каб'){} else {
    dimsGroup.add(dimLine(new THREE.Vector3(hx+0.12,0.01,bz),new THREE.Vector3(hx+0.12,0.01,fz)));
    dimsGroup.add(dimLabel((cfg.d||Math.round(D*1000))+' мм',hx+0.12,0.06,offZ+D/2));
  }
}

const isCab=(CFG.kind||'каб')==='каб' && CFG.t!=='shower' && CFG.t!=='urinal';
const bbox = isCab ? buildCabins(CFG) : buildPanels(CFG);

/* ============ камера / контролі ============ */
const sphere=bbox.getBoundingSphere(new THREE.Sphere());
const center=sphere.center.clone();
const controls=new OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.target.copy(center);
controls.minDistance=sphere.radius*0.8; controls.maxDistance=sphere.radius*4;
controls.maxPolarAngle=Math.PI*0.495; controls.enablePan=false;
const dist=sphere.radius/Math.sin(THREE.MathUtils.degToRad(camera.fov/2))*0.92;
function frame(az){ camera.position.set(center.x+Math.sin(az)*dist*0.8,center.y+dist*0.42,center.z+Math.cos(az)*dist*0.8); camera.lookAt(center); controls.update(); }
frame(0.62);

let auto=!reduce;
controls.addEventListener('start',()=>{ if(auto){auto=false; setBtn('rot',false);} hideHint(); });

/* ============ UI ============ */
const cur=CFG.cur||'€', fmt=n=>Math.round(n).toLocaleString('uk-UA');
function specHtml(){
  const dims=isCab?`${CFG.f||'—'}×${CFG.d||'—'}×${CFG.h||'—'} мм`:`${CFG.pn||1} × ${CFG.pw||1000} мм, H ${CFG.h||2100}`;
  const doors=isCab?`${CFG.ns||0}${CFG.ni?(' + '+CFG.ni+' інкл.'):''}`:'—';
  const uah=CFG.price?Math.round(CFG.price*52.06).toLocaleString('uk-UA')+' грн':'';
  return `<div class="plabel">Ваш проєкт</div><h2 id="specName">${CFG.tn||'Сантехнічна кабіна'}</h2>
  <div class="decor"><div class="sw" id="specSw" style="background:${CFG.hex||'#ccc'}"></div>
    <div class="dn"><b id="specDn">${CFG.dc||''} ${CFG.dn||''}</b><span>HPL Fundermax · FH · ${CFG.core||'black core'}</span></div></div>
  <div class="rows">
    <div class="rw"><span>Габарити</span><span>${dims}</span></div>
    <div class="rw"><span>Двері</span><span>${doors}</span></div>
    <div class="rw"><span>Фурнітура</span><span>${CFG.fit||'нержавіюча сталь'}</span></div>
  </div>
  ${CFG.price?`<div class="price"><small>Орієнтовна<br>вартість</small><div class="pv"><b>${fmt(CFG.price)} ${cur}</b><span>≈ ${uah}</span></div></div>`:''}`;
}
const specEl=document.getElementById('spec'); specEl.innerHTML=specHtml();
specEl.addEventListener('click',()=>{ if(innerWidth<=760) specEl.classList.toggle('open'); });

/* декор-чипи */
if(isCab){
  document.getElementById('decorrow').innerHTML=DECOR_OPTIONS.map(d=>
    `<button class="dchip ${d.code===CFG.dc?'sel':''}" data-code="${d.code}" data-hex="${d.hex}" data-name="${d.name}">
      <span class="dot" style="background:${d.hex}"></span>${d.code} ${d.name}</button>`).join('');
  document.querySelectorAll('.dchip').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.dchip').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    colorTarget.set(b.dataset.hex);
    CFG.dc=b.dataset.code; CFG.dn=b.dataset.name; CFG.hex=b.dataset.hex;
    document.getElementById('specSw').style.background=b.dataset.hex;
    document.getElementById('specDn').textContent=b.dataset.code+' '+b.dataset.name;
    track('decor',{code:b.dataset.code});
  });
} else document.getElementById('decorrow').style.display='none';

const ICONS={
  rot:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/>',
  doors:'<rect x="3" y="3" width="8" height="18" rx="1"/><path d="M13 6l8 3v9l-8 3z"/>',
  dims:'<path d="M3 6h18M3 6v3M21 6v3M6 14h12M6 14v3M18 14v3"/>',
  reset:'<path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/>',
  full:'<path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/>',
  cam:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
  ar:'<path d="M12 2l9 5v10l-9 5-9-5V7z"/><path d="M3 7l9 5 9-5M12 12v10"/>'
};
let doorsOpen=false, dimsOn=false;
const defs=[
  ['rot','Автообертання',()=>{ if(reduce)return; auto=!auto; setBtn('rot',auto); }],
  ['doors','Відкрити двері',()=>{ doorsOpen=!doorsOpen; setBtn('doors',doorsOpen); track('doors',{open:doorsOpen}); }],
  ['dims','Розміри',()=>{ dimsOn=!dimsOn; if(dimsGroup) dimsGroup.visible=dimsOn; setBtn('dims',dimsOn); track('dims',{on:dimsOn}); }],
  ['div'],
  ['reset','Скинути вид',()=>frame(0.62)],
  ['full','На весь екран',()=>{ document.fullscreenElement?document.exitFullscreen?.():document.documentElement.requestFullscreen?.(); }],
  ['cam','Зберегти фото',()=>snapshot()],
];
const isTouch=matchMedia('(pointer:coarse)').matches;
if(isTouch) defs.push(['ar','AR — у приміщенні',()=>openAR()]);
const cont=document.getElementById('controls');
cont.innerHTML=defs.map(d=> d[0]==='div'?'<div class="cdiv"></div>'
  :`<button class="cbtn" data-k="${d[0]}" aria-label="${d[1]}"><span class="tip">${d[1]}</span><svg viewBox="0 0 24 24">${ICONS[d[0]]}</svg></button>`).join('');
const realDefs=defs.filter(d=>d[0]!=='div');
cont.querySelectorAll('.cbtn').forEach((el,i)=> el.onclick=realDefs[i][2]);
function setBtn(k,on){ const el=cont.querySelector(`[data-k="${k}"]`); if(el) el.classList.toggle('on',on); }
setBtn('rot',auto);

let hintT=setTimeout(hideHint,5500);
function hideHint(){ const h=document.getElementById('hint'); if(h){h.style.opacity='0';setTimeout(()=>h.remove(),500);} clearTimeout(hintT); }
function snapshot(){ renderer.render(scene,camera);
  const a=document.createElement('a'); a.download='budzirka-3d-'+(CFG.dc||'project')+'.png';
  a.href=renderer.domElement.toDataURL('image/png'); a.click(); track('screenshot',{}); }

/* CTA з телефоном менеджера */
if(CFG.tel){ const o=document.getElementById('orderBtn'); o.href='tel:'+CFG.tel; o.textContent='📞 Зв’язатися'; }
document.getElementById('orderBtn').addEventListener('click',()=>track('cta',{}));

/* ============ AR (best-effort, gated) ============ */
let arURL=null, mvLoaded=false, mvEl=null;
async function openAR(){
  try{
    track('ar',{});
    if(!mvLoaded){ await import('https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js'); mvLoaded=true; }
    if(!arURL){
      const { GLTFExporter }=await import('three/addons/exporters/GLTFExporter.js');
      const glb=await new Promise((res,rej)=>new GLTFExporter().parse(root,res,rej,{binary:true,onlyVisible:true}));
      arURL=URL.createObjectURL(new Blob([glb],{type:'model/gltf-binary'}));
    }
    if(!mvEl){ mvEl=document.createElement('model-viewer');
      mvEl.setAttribute('ar',''); mvEl.setAttribute('ar-modes','webxr scene-viewer quick-look');
      mvEl.setAttribute('ar-scale','fixed'); mvEl.style.display='none'; document.body.appendChild(mvEl); }
    mvEl.src=arURL;
    await new Promise(r=>{ if(mvEl.loaded) r(); else mvEl.addEventListener('load',r,{once:true}); setTimeout(r,2500); });
    if(mvEl.canActivateAR) mvEl.activateAR();
    else alert('AR недоступний на цьому пристрої. Спробуйте відкрити посилання на телефоні (iPhone — Safari, Android — Chrome).');
  }catch(e){ alert('Не вдалося запустити AR на цьому пристрої.'); }
}

/* ============ цикл ============ */
function resize(){ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRenderer.setSize(innerWidth,innerHeight); }
addEventListener('resize',resize);
function loop(){
  requestAnimationFrame(loop);
  decorMat.color.lerp(colorTarget,0.16);
  const tgt=doorsOpen?-1.15:0;
  doorPivots.forEach(p=>{ p.rotation.y += (tgt-p.rotation.y)*0.14; });
  if(auto && !reduce){ const t=Date.now()*0.00018;
    camera.position.x=center.x+Math.sin(t)*dist*0.8; camera.position.z=center.z+Math.cos(t)*dist*0.8;
    camera.position.y=center.y+dist*0.42; camera.lookAt(center); }
  controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
loop();
requestAnimationFrame(()=>requestAnimationFrame(()=>{
  window.__ready=true; const l=document.getElementById('loader'); if(l){ l.classList.add('hide'); setTimeout(()=>l.remove(),700); }
  track('loaded',{type:CFG.t,decor:CFG.dc});
}));
</script>
</body>
</html>

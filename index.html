<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Онлайн-конфігуратор виробів BUDZIRKA — сантехнічні кабіни та стільниці Fundermax. Миттєвий розрахунок та комерційна пропозиція." />
<title>BUDZIRKA · Конфігуратор</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23274C4F'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#274C4F; --brand-2:#456A6D; --brand-3:#42504b;
  --ink:#152420; --ink-soft:#3c4a46; --ink-mut:#5f6f6a;
  --bg:#FBFCFC; --surface:#EEF4F5; --surface-2:#E2EDEF; --white:#ffffff;
  --border:#dbe6e6; --border-2:#cddbdb; --brand-soft:#e6f0f0;
  --ok:#2e7d5b; --ok-soft:#e4f2ea; --warn:#9a6b12; --warn-soft:#f4ecda;
  --err:#a5471f; --err-soft:#f7e8e0;
  --shadow-sm:0 1px 2px rgba(21,36,32,.05);
  --shadow:0 2px 6px rgba(21,36,32,.06),0 14px 34px rgba(21,36,32,.07);
  --shadow-lg:0 24px 60px rgba(21,36,32,.14);
  --r:16px; --r-sm:11px; --r-pill:100px;
  --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--ink);background:var(--surface);line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;color:inherit}
::selection{background:var(--brand);color:#fff}
:focus-visible{outline:2.5px solid var(--brand);outline-offset:2px;border-radius:6px}
.topbar :focus-visible,.totband :focus-visible{outline-color:#fff}
.opt:active,.sw:active,.pcard:active,.chip:active,.roomtab:active,.steps .st:active{transform:scale(.985)}
.summary .price,.summary .lines,.ei-price,.sr-price,.quote td.r,.quote .qtot,.totband .tb-sum{font-variant-numeric:tabular-nums}
.preview{background-image:radial-gradient(var(--surface-2) 1.1px,transparent 1.1px);background-size:15px 15px}

.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
  background:var(--brand);color:#fff;padding:13px 24px;box-shadow:0 2px 18px rgba(21,36,32,.16)}
.logo{display:flex;align-items:center;gap:11px;cursor:pointer}
.logo .mark{width:32px;height:32px;border-radius:9px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:17px}
.logo b{font-size:18px;letter-spacing:.6px}
.logo span{color:#b8cdce;font-size:13px;margin-left:3px;font-weight:400}
.topbar .spacer{flex:1}
.acct-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:#dfe9ea;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:var(--r-pill)}
.acct-chip b{color:#fff}
.cart{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.12);color:#fff;
  border:1px solid rgba(255,255,255,.22);padding:8px 16px;border-radius:var(--r-pill);font-size:13.5px;font-weight:600;transition:.15s}
.cart:hover{background:rgba(255,255,255,.2)}
.cart .cn{background:#fff;color:var(--brand);min-width:20px;height:20px;padding:0 5px;border-radius:999px;display:inline-grid;place-items:center;font-size:12px;font-weight:800}

.wrap{max-width:1200px;margin:0 auto;padding:30px 24px 70px}
.page-title{font-size:13px;color:var(--ink-mut);margin:0 0 20px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.page-title .crumb{cursor:pointer}
.page-title .crumb:hover{color:var(--brand)}
.page-title .sep{color:var(--border-2)}
.page-title b{color:var(--ink)}

.hero{margin:6px 0 30px}
.hero h1{font-size:34px;margin:0 0 10px;letter-spacing:-.6px;font-weight:800}
.hero p{margin:0;color:var(--ink-soft);max-width:620px;font-size:16px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.pcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px;cursor:pointer;transition:.18s cubic-bezier(.2,.7,.3,1);box-shadow:var(--shadow);position:relative}
.pcard::after{content:"";position:absolute;inset:0;border:2px solid transparent;border-radius:var(--r);transition:.18s;pointer-events:none}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.pcard:hover::after{border-color:var(--brand)}
.pcard .ico{width:62px;height:62px;border-radius:16px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;margin-bottom:18px}
.pcard h3{margin:0 0 7px;font-size:21px}
.pcard p{margin:0;color:var(--ink-soft);font-size:14.5px}
.pcard .go{margin-top:18px;color:var(--brand);font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.pcard:hover .go{gap:10px}

.wizard{display:grid;grid-template-columns:1fr 392px;gap:26px;align-items:start}
.steps{display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap}
.steps .st{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-mut);font-weight:500;background:var(--white);border:1px solid var(--border);padding:8px 14px;border-radius:var(--r-pill);cursor:pointer;transition:.15s}
.steps .st .n{width:21px;height:21px;border-radius:50%;background:var(--surface-2);display:grid;place-items:center;font-size:11.5px;font-weight:700;color:var(--ink-soft)}
.steps .st.active{color:var(--ink);border-color:var(--brand);box-shadow:0 0 0 1px var(--brand)}
.steps .st.active .n{background:var(--brand);color:#fff}
.steps .st.done .n{background:var(--ok);color:#fff}

.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:var(--shadow);min-height:380px;animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel h2{margin:0 0 5px;font-size:22px;letter-spacing:-.3px}
.panel .sub{margin:0 0 22px;color:var(--ink-soft);font-size:14.5px}
.panel h4{margin:22px 0 10px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-mut)}

.grid{display:grid;gap:13px}
.grid.c2{grid-template-columns:repeat(2,1fr)}
.grid.c3{grid-template-columns:repeat(3,1fr)}
.grid.c4{grid-template-columns:repeat(4,1fr)}
.opt{border:1.5px solid var(--border);border-radius:var(--r-sm);padding:15px;cursor:pointer;transition:.15s;background:var(--white);text-align:left;position:relative}
.opt:hover{border-color:var(--brand-2);transform:translateY(-1px)}
.opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.opt.sel::before{content:"✓";position:absolute;top:9px;right:11px;color:var(--brand);font-weight:800;font-size:13px}
.opt .t{font-weight:600;font-size:14.5px}
.opt .d{font-size:12.5px;color:var(--ink-soft);margin-top:3px;line-height:1.35}
.opt.dis{opacity:.45;pointer-events:none}
.opt .opt-ph{height:96px;border-radius:8px;overflow:hidden;margin-bottom:9px;background:var(--surface)}
.opt .opt-ph img{width:100%;height:100%;object-fit:cover;display:block}
.qsk{max-width:330px;margin-top:8px}
.qsk svg{width:100%;height:auto;display:block}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1.5px solid var(--border);background:var(--white);border-radius:var(--r-pill);padding:8px 16px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s}
.chip:hover{border-color:var(--brand-2)}
.chip.sel{background:var(--brand);border-color:var(--brand);color:#fff}

.matbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.matbar input[type=search],.matbar select{border:1.5px solid var(--border);border-radius:var(--r-pill);padding:8px 14px;font-size:13px;background:var(--white)}
.matbar label{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft);cursor:pointer}
.swatches{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:13px}
.sw{border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:.15s;background:var(--white)}
.sw:hover{border-color:var(--brand-2);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.sw.sel{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
.sw .chipc{height:64px;position:relative;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.sw.sel .chipc::after{content:"✓";position:absolute;top:6px;right:8px;width:20px;height:20px;background:var(--brand);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:12px}
.sw .meta{padding:9px 10px}
.sw .code{font-weight:700;font-size:13px}
.sw .nm{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sw .badge{display:inline-block;margin-top:6px;font-size:10.5px;padding:2px 8px;border-radius:999px;font-weight:600}
.badge.in{background:var(--ok-soft);color:var(--ok)}
.badge.out{background:var(--warn-soft);color:var(--warn)}
.empty{padding:30px;text-align:center;color:var(--ink-mut);font-size:14px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
.field .hint{font-size:12px;color:var(--ink-mut);font-weight:400}
.inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;font-size:14.5px;background:var(--white);transition:.15s}
.inp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.inp.bad{border-color:#c9512e}
.inp[readonly]{background:var(--surface);color:var(--ink-soft)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.row.c3{grid-template-columns:repeat(3,1fr)}
.stepper{display:flex;align-items:stretch;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;width:fit-content}
.stepper button{background:var(--surface);width:42px;font-size:19px;color:var(--brand)}
.stepper button:hover{background:var(--brand-soft)}
.stepper input{border:none;width:66px;text-align:center;font-size:15px;font-weight:600;background:var(--white)}
.stepper input:focus{outline:none}

.plate{border:1.5px solid var(--brand);background:var(--brand-soft);border-radius:var(--r-sm);padding:14px 16px;margin:4px 0 16px;animation:fade .25s ease}
.plate.warn{border-color:#d8b35e;background:var(--warn-soft)}
.plate .pt{font-weight:700;font-size:14.5px;margin-bottom:3px}
.plate .pd{font-size:13px;color:var(--ink-soft);margin-bottom:10px}
.plate .row-btn{display:flex;gap:8px;flex-wrap:wrap}
.btn-sm{border:1.5px solid var(--border);background:var(--white);padding:8px 16px;border-radius:var(--r-pill);font-size:13px;font-weight:600;transition:.14s}
.btn-sm:hover{border-color:var(--brand);color:var(--brand)}
.btn-sm.pri{background:var(--brand);border-color:var(--brand);color:#fff}
.btn-sm.pri:hover{background:var(--brand-2)}

.roomtabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.roomtab{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border);background:var(--white);border-radius:var(--r-pill);padding:8px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.14s}
.roomtab.sel{border-color:var(--brand);background:var(--brand-soft)}
.roomtab .x{color:var(--ink-mut);font-size:14px;padding:0 2px}
.roomtab .x:hover{color:var(--err)}
.roomtab.add{border-style:dashed;color:var(--brand)}

.infocard{background:var(--surface);border-radius:var(--r-sm);padding:13px 15px;font-size:13px;color:var(--ink-soft);line-height:1.6;margin:14px 0 4px}
.fset{border:1px solid var(--border);border-radius:13px;padding:16px 18px 8px;margin:0 0 14px;background:var(--bg)}
.fset>h4{margin:0 0 14px}
.infocard b{color:var(--ink)}
.kvrow{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px}
.kv{background:var(--surface);border-radius:var(--r-sm);padding:9px 14px;font-size:13px}
.kv b{display:block;font-size:12px;color:var(--ink-mut);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}

.aside{position:sticky;top:90px;display:flex;flex-direction:column;gap:16px}
.preview{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.preview .ttl{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut);margin-bottom:10px;font-weight:600}
.preview svg{width:100%;height:auto;display:block}
.summary{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.summary .plabel{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut);font-weight:600}
.summary .price{font-size:32px;font-weight:800;letter-spacing:-.8px;display:inline-block}
.summary .price.bump{animation:bump .26s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
.summary .price small{font-size:13px;font-weight:600;color:var(--ink-mut)}
.summary .uah{font-size:13px;color:var(--ink-mut);margin-top:2px}
.summary .lines{margin:15px 0;border-top:1px dashed var(--border-2);padding-top:13px;display:flex;flex-direction:column;gap:8px}
.summary .ln{display:flex;justify-content:space-between;font-size:13px;gap:12px}
.summary .ln span:first-child{color:var(--ink-soft)}
.summary .ln.tot{font-weight:700;font-size:15px;border-top:1px solid var(--border);padding-top:10px;margin-top:3px}
.note{font-size:11.5px;color:var(--ink-mut);background:var(--surface);border-radius:9px;padding:9px 11px;margin-top:11px;line-height:1.45}
.note.err{color:var(--err);background:var(--err-soft)}

.nav{display:flex;gap:10px;margin-top:8px}
.btn{border:1.5px solid var(--border);background:var(--white);color:var(--ink);padding:12px 18px;border-radius:var(--r-pill);font-size:14px;font-weight:600;transition:.15s;min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;flex:1}
.btn.primary:hover{background:var(--brand-2);border-color:var(--brand-2);color:#fff}
.btn.ghost{flex:0 0 auto}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.lg{padding:14px 26px;font-size:15px}

.est{display:grid;grid-template-columns:1fr 360px;gap:26px;align-items:start}
.est-list{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.est-item{display:flex;gap:14px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--surface-2)}
.est-item:last-child{border-bottom:none}
.est-item .ei-main{flex:1;min-width:0}
.est-item .ei-title{font-weight:600;font-size:14.5px}
.est-item .ei-meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;white-space:pre-line}
.est-item .ei-price{font-weight:700;white-space:nowrap}
.est-item .rm{width:30px;height:30px;border-radius:50%;color:var(--ink-mut);font-size:16px}
.est-item .rm:hover{background:var(--err-soft);color:var(--err)}
.miniqty{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:var(--r-pill);overflow:hidden}
.miniqty button{width:30px;height:30px;color:var(--brand);font-size:15px}
.miniqty button:hover{background:var(--brand-soft)}
.miniqty span{min-width:30px;text-align:center;font-weight:600;font-size:13.5px}
.est-empty{background:var(--white);border:1px dashed var(--border-2);border-radius:var(--r);padding:50px 24px;text-align:center}
.est-empty h3{margin:0 0 8px}
.est-empty p{margin:0 0 18px;color:var(--ink-soft)}
.formcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);padding:22px;margin-top:14px}
.formcard textarea.inp{resize:vertical;min-height:46px}

.quote{max-width:780px;margin:0 auto;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.quote .qbar{background:var(--brand);color:#fff;padding:24px 32px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:4px solid var(--brand-2)}
.quote .qbar .co b{font-size:22px;letter-spacing:.5px}
.quote .qbar .co div{font-size:12.5px;color:#cfe0e1;margin-top:3px}
.quote .qbar .qn{text-align:right;font-size:13px}
.quote .qbar .qn b{font-size:15px}
.quote .qbody{padding:28px 32px 34px}
.quote .qmeta{font-size:13.5px;color:var(--ink-soft);margin-bottom:18px;line-height:1.7}
.quote .qmeta b{color:var(--ink)}
.quote table{width:100%;border-collapse:collapse;margin:6px 0 16px;font-size:13.5px}
.quote th{text-align:left;border-bottom:2px solid var(--ink);padding:9px 7px;font-weight:600}
.quote td{padding:10px 7px;border-bottom:1px solid var(--surface-2);vertical-align:top}
.quote td.r,.quote th.r{text-align:right;white-space:nowrap}
.quote tfoot td{border:none;font-weight:700}
.quote .qtot{text-align:right;font-size:24px;font-weight:800;margin-top:6px}
.quote .quah{text-align:right;font-size:13px;color:var(--ink-mut)}
.quote .qterms{margin-top:22px;font-size:12px;color:var(--ink-mut);border-top:1px solid var(--surface-2);padding-top:14px;line-height:1.6}

.schemebox{border:1px solid var(--border);border-radius:var(--r-sm);background:var(--white);padding:12px 14px;margin-top:13px;box-shadow:var(--shadow-sm);animation:fade .25s ease}
.schemebox svg{display:block;width:100%;max-width:430px;height:auto;margin:0 auto}

/* ---- summary (підсумок) ---- */
.sum-h{display:flex;align-items:center;gap:10px;margin:24px 0 12px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut)}
.sum-h::after{content:"";flex:1;height:1px;background:var(--border)}
.sum-h:first-of-type{margin-top:6px}
.sumgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.sumcard{background:var(--white);border:1px solid var(--border);box-shadow:var(--shadow-sm);border-radius:var(--r-sm);padding:11px 14px}
.sumcard b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-mut);margin-bottom:4px;font-weight:600}
.sumcard .v{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.sumclient{display:flex;align-items:center;gap:16px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);padding:16px 18px;flex-wrap:wrap}
.sumclient .ava{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:700;font-size:18px;flex:0 0 auto}
.sumclient .who b{display:block;font-size:16px}
.sumclient .who span{font-size:13px;color:var(--ink-soft)}
.sumclient .tags{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.tagchip{font-size:12px;font-weight:600;background:var(--brand-soft);color:var(--brand);padding:5px 12px;border-radius:999px}
.summat{display:flex;gap:18px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);padding:16px 18px;flex-wrap:wrap}
.summat .bigsw{width:88px;height:88px;border-radius:12px;border:1px solid rgba(0,0,0,.08);flex:0 0 auto;position:relative}
.summat .bigsw span{position:absolute;left:9px;bottom:7px;font-size:11.5px;font-weight:700}
.summat .mat-info{flex:1;min-width:220px}
.summat .mat-name{font-weight:700;font-size:16px;margin-bottom:2px}
.summat .mat-sub{font-size:13px;color:var(--ink-soft);margin-bottom:10px}
.specs{display:flex;gap:8px;flex-wrap:wrap}
.spec{font-size:12.5px;background:var(--surface);border-radius:999px;padding:5px 12px;color:var(--ink-soft)}
.spec b{color:var(--ink)}
.sumroom .sr-body{display:flex;gap:18px;align-items:flex-start}
.sumroom .sr-rows{flex:1}
.sumroom .sr-sketch{flex:0 0 200px;border:1px dashed var(--border-2);border-radius:10px;padding:6px;background:var(--bg)}

async function postLead(row){
  try{ if(typeof fetch==='undefined') return false;
    const r=await fetch(LEADS_API.url+'/budzirka_leads',{ method:'POST', keepalive:true,
      headers:{ 'Content-Type':'application/json','apikey':LEADS_API.key,
        'Authorization':'Bearer '+LEADS_API.key,'Prefer':'return=minimal' },
      body:JSON.stringify(row) });
    return r.ok;
  }catch(e){ return false; }
}
function queueLead(row){ try{ const q=JSON.parse(localStorage.getItem('bz_lead_queue')||'[]');
  q.push(row); localStorage.setItem('bz_lead_queue', JSON.stringify(q.slice(-20))); }catch(e){} }
async function submitLead(){
  const row=leadRow();
  if(await postLead(row)) track('lead_sent',{total:row.total_eur});
  else { queueLead(row); track('lead_failed',{}); }   // не загубити — повторимо при наступному завантаженні
}
async function flushLeadQueue(){
  let q; try{ q=JSON.parse(localStorage.getItem('bz_lead_queue')||'[]'); }catch(e){ q=[]; }
  if(!q.length) return;
  const remain=[];
  for(const row of q){ if(!(await postLead(row))) remain.push(row); }
  try{ localStorage.setItem('bz_lead_queue', JSON.stringify(remain)); }catch(e){}
  if(q.length>remain.length) track('lead_flushed',{recovered:q.length-remain.length});
}

async function rpc(fn,args){ try{ if(typeof fetch==="undefined") return null;
  const r=await fetch(SBR+"/rpc/"+fn,{method:"POST",
    headers:{"Content-Type":"application/json","apikey":SBKEY,"Authorization":"Bearer "+SBKEY},
    body:JSON.stringify(args||{})}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }

/* колір тексту на свотчі за яскравістю декору (контраст) */
function txtOn(hex){
  const h=String(hex||'').replace('#','');
  if(h.length<6) return '#fff';
  const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  return (0.299*r+0.587*g+0.114*b)>165?'#3c4a46':'#ffffff';
}
/* відтінок: shade('#aabbcc',-0.25) → темніший на 25% */
function shade(hex,p){
  const h=String(hex||'#9aa3a8').replace('#','');
  if(h.length<6) return hex;
  const n=i=>Math.max(0,Math.min(255,Math.round(parseInt(h.substr(i,2),16)*(1+p))));
  return '#'+[0,2,4].map(i=>n(i).toString(16).padStart(2,'0')).join('');
}

  by.forEach(b=>bin+=String.fromCharCode(b)); return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }

/* ---- каталог із бази (керується адмінкою; знімок у коді — резерв) ---- */
async function loadCatalog(){
  try{
    if(typeof fetch==='undefined') return;
    const h={apikey:LEADS_API.key,Authorization:'Bearer '+LEADS_API.key};
    const u=LEADS_API.url;
    const [st,t,d,e]=await Promise.all([
      fetch(u+'/budzirka_settings?select=*&id=eq.1',{headers:h}).then(r=>r.json()),
      fetch(u+'/budzirka_cabin_types?select=*&active=eq.true&order=sort',{headers:h}).then(r=>r.json()),
      fetch(u+'/budzirka_decors?select=*&active=eq.true&order=code',{headers:h}).then(r=>r.json()),
      fetch(u+'/budzirka_edges?select=*&active=eq.true&order=n',{headers:h}).then(r=>r.json()),
    ]);
    if(Array.isArray(t)&&t.length) CABIN_TYPES=t.map(x=>({id:x.id,name:x.name,desc:x.descr||'',h:x.h||2100,
      fit:String(x.fit||'inox').split(',').map(s=>s.trim()).filter(Boolean),rooms:!!x.rooms,photo:x.photo_url||''}));
    if(Array.isArray(d)&&d.length) DECORS=d.map(x=>({code:x.code,dir:x.dir,name:x.name||x.code,hex:x.hex||'#9aa3a8',
      surf:x.surf||'FH',core:x.core||'black core',stock:+x.stock||0,m2:x.m2_price!=null?+x.m2_price:null}));
    if(Array.isArray(e)&&e.length) EDGES=e.map(x=>({n:x.n,name:x.name,desc:x.descr||'',rate:+x.rate||0}));
    const s=Array.isArray(st)&&st[0];
    if(s){ CONFIG.cabins.ratePerM2=+s.rate_per_m2||170; CONFIG.eurUah=+s.eur_uah||52.06;
      CONFIG.counters.cutoutFee=+s.cutout_fee||15; CONFIG.counters.mixerHoleFee=+s.mixer_fee||5;
      CONFIG.counters.defaultM2Price=+s.default_m2||135; }
    if(!typeBy(state.cabins.type)&&CABIN_TYPES[0]) state.cabins.type=CABIN_TYPES[0].id;
    if(!decorBy(state.cabins.decor)&&decorsFor('cabins')[0]) state.cabins.decor=decorsFor('cabins')[0].code;
    if(!decorBy(state.counters.decor)&&decorsFor('counters')[0]) state.counters.decor=decorsFor('counters')[0].code;
    if(!EDGES.find(x=>x.n===state.counters.edge)&&EDGES[0]) state.counters.edge=EDGES[0].n;
    render();
  }catch(e){}
}

/* ============================================================
   5) PRICING — реальна формула з бази
   Площа кабінок = фасад×H + перегородки×(глибина×H) + бічні×(глибина×H)
   Вартість = Площа × 170 EUR/м²   (звірено: 4000×2100 + 3×1200×2100 = 15.96 м² → 2 713.20 €)
   ============================================================ */
function cabinMinW(doorW){ return BZ.cabinMinW(doorW); }   // → pricing.js (єдине джерело)
function maxDoors(room){ // скільки кабінок влазить у фасад
  return Math.floor(room.facade / cabinMinW(room.wStd||650));
}
/* перегородки — автоматично за видом: міжстінна = дверей−1, кутова = дверей, окрема = дверей+1 */
function roomParts(room){ return BZ.parts((room.nStd||0)+(room.nInc||0), room.vid); }   // → pricing.js
function kindHeight(room,type){
  if(room.kind==='каб') return type?type.h:2100;
  const k=ROOM_KINDS.find(x=>x.id===room.kind); return (k&&k.h)||2000;
}
function roomArea(room, type){   // площа → pricing.js (єдине джерело з 3D-конфігуратором)
  if(room.kind==='каб')
    return BZ.cabinArea(room.facade, room.depth, (room.nStd||0)+(room.nInc||0), room.vid, type?type.h:2100);
  // душові/пісуарні: n панелей × ширина × власна висота перегородки (не кабіни)
  return BZ.panelArea(room.pn, room.pw, kindHeight(room,type));
}
function roomCost(room,type){ return roomArea(room,type)*CONFIG.cabins.ratePerM2; }
function roomDimsValid(room){
  if(room.kind!=='каб') return (room.pn||0)>=1 && (room.pw||0)>=100;
  const c=CONFIG.cabins;
  return room.depth>=c.depthMin&&room.depth<=c.depthMax&&room.facade>=c.cabinMinWidth;
}
function roomValid(room){
  if(room.kind!=='каб') return (room.pn||0)>=1 && (room.pw||0)>=100;
  const c=CONFIG.cabins;
  if(room.depth<c.depthMin||room.depth>c.depthMax) return false;
  if(room.facade<c.cabinMinWidth) return false;
  const total=(room.nStd||0)+(room.nInc||0);
  if(total<1) return false;
  const need=(room.nStd||0)*cabinMinW(room.wStd)+(room.nInc||0)*cabinMinW(room.wInc);
  return need<=room.facade;
}
function roomProblem(room){
  if(room.kind!=='каб') return '';
  const c=CONFIG.cabins;
  if(room.depth<c.depthMin||room.depth>c.depthMax) return 'Глибина: від '+c.depthMin+' до '+c.depthMax+' мм.';
  const total=(room.nStd||0)+(room.nInc||0);
  if(total<1) return 'Додайте хоча б одні двері.';
  const need=(room.nStd||0)*cabinMinW(room.wStd)+(room.nInc||0)*cabinMinW(room.wInc);
  if(need>room.facade) return 'Не вміщується: '+total+' кабін потребують мін. '+need.toLocaleString('uk-UA')+' мм, фасад '+room.facade.toLocaleString('uk-UA')+' мм (мін. ширина кабінки — '+c.cabinMinWidth+' мм).';
  return '';
}
function priceCabins(c){
  const type=typeBy(c.type);
  const rooms=c.rooms.map(r=>({room:r, area:roomArea(r,type), cost:roomCost(r,type), ok:roomValid(r)}));
  const area=rooms.reduce((a,r)=>a+r.area,0);
  const subtotal=rooms.reduce((a,r)=>a+r.cost,0);
  return {rooms, area, subtotal, type};
}
function priceCounters(c){
  const segs=c.segs.slice(0,SHAPES.find(s=>s.id===c.shape).segs);
  const area=segs.reduce((a,s)=>a+(s.l*s.w)/1e6,0);
  const dec=decorBy(c.decor);
  const m2=(dec&&dec.m2!=null)?dec.m2:(CONFIG.counters.m2Price[c.decor]||CONFIG.counters.defaultM2Price);
  const material=area*m2;
  const edgeM=segs.reduce((a,s)=>a+s.l/1000,0);
  const edge=EDGES.find(e=>e.n===c.edge)||EDGES[0];
  const edgeCost=edgeM*edge.rate;
  const cutCost=(c.cutouts||0)*CONFIG.counters.cutoutFee;
  const mixCost=(c.mixer||0)*CONFIG.counters.mixerHoleFee;
  const subtotal=material+edgeCost+cutCost+mixCost;
  return {area,m2,material,edgeM,edgeRate:edge.rate,edgeCost,cutCost,mixCost,subtotal,edgeName:edge.name,dec};
}
function estimateTotals(){
  const subtotal=state.estimate.reduce((a,i)=>a+i.unitBase*i.qty,0);
  const catF=CONFIG.priceCat[state.client.priceCat]||1;
  const total=subtotal*catF;
  return {subtotal,catF,discount:subtotal-total,total};
}

function sketchRoom(room,type,decorHex){
  const H=kindHeight(room,type);

  if(room.kind!=='каб'){
    // панелі душові/пісуарні
    const n=Math.max(1,Math.min(10,room.pn||1)), pw=room.pw||1000, gap=120;
    const totW=n*pw+(n-1)*gap;
    const sc=Math.min((W-PAD-PADR)/totW, 150/H);
    const x0=PAD, y0=26, ph=H*sc;
    let s='';
    for(let i=0;i<n;i++){
      const x=x0+i*(pw+gap)*sc;
      s+=`<rect x="${x.toFixed(1)}" y="${y0}" width="${(pw*sc).toFixed(1)}" height="${ph.toFixed(1)}" rx="3" fill="${decorHex}" stroke="${shade(decorHex,-0.32)}" stroke-width="1.4"/>
          <rect x="${(x+pw*sc/2-2).toFixed(1)}" y="${(y0+ph).toFixed(1)}" width="4" height="9" fill="var(--brand-3)"/>`;
    }
    return `<svg viewBox="0 0 ${W} ${y0+H*sc+34}">
      ${s}
      <line x1="${W-PADR+14}" y1="${y0}" x2="${W-PADR+14}" y2="${(y0+ph).toFixed(1)}" stroke="var(--ink-mut)" stroke-width="1"/>
      <text x="${W-PADR+26}" y="${(y0+ph/2).toFixed(1)}" font-size="10" fill="var(--ink-soft)" text-anchor="middle" transform="rotate(-90 ${W-PADR+26} ${(y0+ph/2).toFixed(1)})">${H} мм</text>
      <text x="${(x0+totW*sc/2).toFixed(1)}" y="${(y0+ph+26).toFixed(1)}" text-anchor="middle" font-size="11" fill="var(--ink-soft)">${n} × ${pw} мм</text>
    </svg>`;
  }
  // кабінки: розкладка фасаду
  const facade=Math.max(room.facade,600);
  const sc=Math.min((W-PAD-PADR)/facade, 168/H);
  const x0=PAD, y0=24, fh=H*sc, fw=facade*sc;
  // кабінки: ширини = мінімалки + рівномірний розподіл залишку
  const cabs=[];
  for(let i=0;i<(room.nStd||0);i++) cabs.push({door:room.wStd, min:cabinMinW(room.wStd), inc:false});
  for(let i=0;i<(room.nInc||0);i++) cabs.push({door:room.wInc, min:cabinMinW(room.wInc), inc:true});
  let body='';

  body+=`<rect x="${x0-3}" y="${y0-7}" width="${(fw+6).toFixed(1)}" height="5" rx="2" fill="var(--ink)"/>`;
  if(cabs.length){
    const minSum=cabs.reduce((a,c)=>a+c.min,0);
    const extra=Math.max(0,facade-minSum)/cabs.length;
    let x=x0;
    const dk=shade(decorHex,-0.32), hndl=txtOn(decorHex);
    cabs.forEach((c,i)=>{
      const cw=(c.min+extra)*sc;
      // панель кабіни — повний колір декору (увесь фасад однотонний, як у житті)
      body+=`<rect x="${x.toFixed(1)}" y="${y0}" width="${cw.toFixed(1)}" height="${fh.toFixed(1)}" fill="${decorHex}"/>`;
      // двері — суцільна рамка (як було)
      const dw=c.door*sc, dx=x+(cw-dw)/2;
      body+=`<rect x="${dx.toFixed(1)}" y="${y0}" width="${dw.toFixed(1)}" height="${fh.toFixed(1)}" fill="${decorHex}" stroke="${dk}" stroke-width="1.4"/>
        <circle cx="${(dx+dw-7).toFixed(1)}" cy="${(y0+fh/2).toFixed(1)}" r="2.4" fill="${hndl}" fill-opacity=".85"/>`;
      if(c.inc) body+=`<text x="${(x+cw/2).toFixed(1)}" y="${(y0+14).toFixed(1)}" text-anchor="middle" font-size="9" fill="${hndl}">♿</text>`;

      body+=`<rect x="${(x+4).toFixed(1)}" y="${(y0+fh).toFixed(1)}" width="3.5" height="9" fill="var(--brand-3)"/>`;
      x+=cw;
      // роз'єднування кабінок — пунктир: на фасаді лінії фактично немає, але перегородка-стіна позаду є
      if(i<cabs.length-1) body+=`<line x1="${x.toFixed(1)}" y1="${y0}" x2="${x.toFixed(1)}" y2="${(y0+fh).toFixed(1)}" stroke="${dk}" stroke-width="1.3" stroke-dasharray="5 3" stroke-opacity=".6"/>`;
    });
    body+=`<rect x="${(x0+fw-8).toFixed(1)}" y="${(y0+fh).toFixed(1)}" width="3.5" height="9" fill="var(--brand-3)"/>`;
    // зовнішній силует фасаду (торцеві панелі/стіни) — суцільний, ледь помітний
    body+=`<rect x="${x0.toFixed(1)}" y="${y0}" width="${fw.toFixed(1)}" height="${fh.toFixed(1)}" fill="none" stroke="${dk}" stroke-width="1" stroke-opacity=".4"/>`;
  }
  // ---- розмір висоти: винесена розмірна лінія зі стрілками + підпис у «пігулці» ----
  // обидва розміри — в одному стилі: винесена лінія + стрілки + число у «пігулці»
  const dimX=x0+fw+18, DX=dimX.toFixed(1), midY=y0+fh/2, MY=midY.toFixed(1);
  const Hs=H.toLocaleString('uk-UA')+' мм', pillW=Hs.length*6+14;
  const wy=y0+fh+26, WY=wy.toFixed(1), WS=room.facade.toLocaleString('uk-UA')+' мм', wPillW=WS.length*6+14;
  return `<svg viewBox="0 0 ${W} ${(y0+fh+46).toFixed(1)}">
    ${body}
    <line x1="${(x0+fw).toFixed(1)}" y1="${y0}" x2="${(dimX+4).toFixed(1)}" y2="${y0}" stroke="var(--border-2)" stroke-width="1"/>
    <line x1="${(x0+fw).toFixed(1)}" y1="${(y0+fh).toFixed(1)}" x2="${(dimX+4).toFixed(1)}" y2="${(y0+fh).toFixed(1)}" stroke="var(--border-2)" stroke-width="1"/>
    <line x1="${DX}" y1="${y0}" x2="${DX}" y2="${(y0+fh).toFixed(1)}" stroke="var(--ink-mut)" stroke-width="1"/>
    <path d="M${(dimX-3).toFixed(1)} ${y0+6} L${DX} ${y0} L${(dimX+3).toFixed(1)} ${y0+6}" fill="none" stroke="var(--ink-mut)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M${(dimX-3).toFixed(1)} ${(y0+fh-6).toFixed(1)} L${DX} ${(y0+fh).toFixed(1)} L${(dimX+3).toFixed(1)} ${(y0+fh-6).toFixed(1)}" fill="none" stroke="var(--ink-mut)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    <g transform="rotate(-90 ${DX} ${MY})">
      <rect x="${(dimX-pillW/2).toFixed(1)}" y="${(midY-9).toFixed(1)}" width="${pillW}" height="18" rx="9" fill="#fff" stroke="var(--border-2)" stroke-width="1"/>
      <text x="${DX}" y="${(midY+3.5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ink)">${Hs}</text>
    </g>
    <line x1="${x0}" y1="${(y0+fh+10).toFixed(1)}" x2="${x0}" y2="${(wy+4).toFixed(1)}" stroke="var(--border-2)" stroke-width="1"/>
    <line x1="${(x0+fw).toFixed(1)}" y1="${(y0+fh+10).toFixed(1)}" x2="${(x0+fw).toFixed(1)}" y2="${(wy+4).toFixed(1)}" stroke="var(--border-2)" stroke-width="1"/>
    <line x1="${x0}" y1="${WY}" x2="${(x0+fw).toFixed(1)}" y2="${WY}" stroke="var(--ink-mut)" stroke-width="1"/>
    <path d="M${(x0+6).toFixed(1)} ${(wy-3).toFixed(1)} L${x0} ${WY} L${(x0+6).toFixed(1)} ${(wy+3).toFixed(1)}" fill="none" stroke="var(--ink-mut)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M${(x0+fw-6).toFixed(1)} ${(wy-3).toFixed(1)} L${(x0+fw).toFixed(1)} ${WY} L${(x0+fw-6).toFixed(1)} ${(wy+3).toFixed(1)}" fill="none" stroke="var(--ink-mut)" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    <rect x="${(x0+fw/2-wPillW/2).toFixed(1)}" y="${(wy-9).toFixed(1)}" width="${wPillW}" height="18" rx="9" fill="#fff" stroke="var(--border-2)" stroke-width="1"/>
    <text x="${(x0+fw/2).toFixed(1)}" y="${(wy+3.5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="var(--ink)">${WS}</text>
  </svg>`;
}

    {x:0,y:0,w:segs[0].l,h:segs[0].w,lab:'СТ1',s:segs[0]},
    {x:0,y:segs[0].w,w:segs[1].w,h:segs[1].l,lab:'СТ2',s:segs[1]},
    {x:segs[0].l-segs[2].w,y:segs[0].w,w:segs[2].w,h:segs[2].l,lab:'СТ3',s:segs[2]}];
  const maxX=Math.max(...rects.map(r=>r.x+r.w)),maxY=Math.max(...rects.map(r=>r.y+r.h));
  const BW=320,BH=180,pad=22;
  const sc=Math.min((BW-pad*2)/maxX,(BH-pad*2)/maxY);
  const dec=decorBy(c.decor),fill=dec?dec.hex:'#ccc';
  let body='';
  rects.forEach((r,idx)=>{
    const x=pad+r.x*sc,y=pad+r.y*sc,w=r.w*sc,h=r.h*sc;
    body+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${fill}" fill-opacity="0.34" stroke="var(--brand)" stroke-width="1.7"/>
      <text x="${(x+w/2).toFixed(1)}" y="${(y+h/2-2).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink)">${r.lab}</text>
      <text x="${(x+w/2).toFixed(1)}" y="${(y+h/2+12).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--ink-soft)">${r.s.l}×${r.s.w}</text>`;
    if(idx===0){
      const n=c.cutouts||0;
      for(let k=0;k<n;k++){
        const cx=x+w*(k+1)/(n+1), cy=y+h/2, rr=Math.min(11,h/3);
        body+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${rr.toFixed(1)}" fill="none" stroke="var(--brand-2)" stroke-width="1.4" stroke-dasharray="3 2"/>`;
      }
    }
  });
  return `<svg viewBox="0 0 ${BW} ${BH}">${body}</svg>`;
}

function render(){
  if(state.screen==='home') app.innerHTML=viewHome();
  else if(state.screen==='cabins') app.innerHTML=viewWizard('cabins');
  else if(state.screen==='counters') app.innerHTML=viewWizard('counters');
  else if(state.screen==='estimate') app.innerHTML=viewEstimate();
  else if(state.screen==='quote') app.innerHTML=viewQuote();
  updateCart(); updateAcct(); save();
  a11y(); animPrice();
  // скрол угору — лише при переході на інший екран/крок, не при виборі опцій
  const st=state[state.screen];
  const viewKey=state.screen+':'+(st&&typeof st.step==='number'?st.step:'');
  if(viewKey!==render._last){
    render._last=viewKey;
    if(state.screen==='cabins'||state.screen==='counters') track('step_viewed',{product:state.screen,step:st.step});
    else track('screen_viewed',{screen:state.screen});
    if((state.screen==='cabins'||state.screen==='counters')&&app.querySelector){
      const ac=app.querySelector('.steps .st.active');
      if(ac&&ac.scrollIntoView) try{ ac.scrollIntoView({inline:'center',block:'nearest'}); }catch(e){}
    }
    window.scrollTo({top:0,behavior:'smooth'});
  }
}
/* клавіатурна доступність: усі клікабельні div-и стають фокусованими кнопками */
function a11y(){
  if(!app.querySelectorAll) return;
  app.querySelectorAll('[data-action]:not(button):not(a):not(input):not(select)').forEach(el=>{
    el.setAttribute('role','button'); el.setAttribute('tabindex','0');
  });
}
/* плавний "доїзд" цифри ціни до нового значення */
function animPrice(){
  const a=state._anim; state._anim=null;
  if(!a||typeof window==='undefined'||!window.requestAnimationFrame||typeof performance==='undefined') return;
  if(!document.querySelector) return;
  const el=document.querySelector('#aside .summary .price');
  if(!el) return;
  const t0=performance.now(), dur=300;
  (function tick(t){
    const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3);
    el.textContent=money2(a.from+(a.to-a.from)*e);
    if(k<1) window.requestAnimationFrame(tick);
  })(t0);
}

  const shape=SHAPES.find(s=>s.id===c.shape);

    case 0: return `<h2>Форма стільниці</h2><p class="sub">Виберіть конфігурацію.</p>
      <div class="grid c3">${SHAPES.map(s=>`<div class="opt ${c.shape===s.id?'sel':''}" data-action="setShape" data-id="${s.id}">
        <div class="t">${s.name}</div><div class="d">${s.desc}</div></div>`).join('')}</div>`;
    case 1:{ let f='';
      for(let i=0;i<shape.segs;i++){
        f+=`<div class="field"><label>Сегмент СТ${i+1} <span class="hint">довжина × глибина, мм</span></label>
          <div class="row">
            <input class="inp ${c.segs[i].l<=0?'bad':''}" type="number" min="100" step="50" data-field="counters.segs.${i}.l" value="${c.segs[i].l}">
            <input class="inp ${c.segs[i].w<=0?'bad':''}" type="number" min="100" step="50" data-field="counters.segs.${i}.w" value="${c.segs[i].w}">
          </div></div>`;
      }
      return `<h2>Розміри сегментів</h2><p class="sub">Габарити кожної частини стільниці.</p>${f}
        <div class="note">Сумарна площа: <b>${priceCounters(c).area.toFixed(2)} м²</b> · розкрій у форматах листів (4100×640, 2040×640, 2040×1300) — наступна фаза.</div>`;}
    case 2: return `<h2>Обробка торця</h2><p class="sub">Реальні ставки обробки з прайсу (за м.п.).</p>
      <div class="grid c3">${EDGES.map(e=>`<div class="opt ${c.edge===e.n?'sel':''}" data-action="setEdge" data-n="${e.n}">
        <div class="t">${e.name}</div><div class="d">${e.desc}</div>
        <div class="d" style="color:var(--brand);margin-top:4px;font-weight:600">${e.rate} €/м.п.</div></div>`).join('')}</div>`;
    case 3: return `<h2>Вирізи та отвори</h2><p class="sub">Фрезерування під мийку/варильну поверхню та отвори.</p>
      <div class="row">
        <div class="field"><label>Вирізи (мийка / варильна) <span class="hint">${CONFIG.counters.cutoutFee} € за шт</span></label>${stepper('counters.cutouts',c.cutouts,0,6)}</div>
        <div class="field"><label>Отвори під змішувач <span class="hint">${CONFIG.counters.mixerHoleFee} € за шт</span></label>${stepper('counters.mixer',c.mixer,0,6)}</div>
      </div>`;
    case 4: return materialStep(c,'counters');
    case 5: return summaryCounters(c);
  }
}

function swGrid(mod){
  const f=state.matFilter;
  let list=decorsFor(mod);
  if(f.search){ const q=f.search.toLowerCase(); list=list.filter(x=>(x.code+' '+x.name).toLowerCase().includes(q)); }
  if(f.stock) list=list.filter(x=>x.stock>0);
  if(!list.length) return `<div class="empty">Нічого не знайдено за фільтром.</div>`;
  const c=state[mod];
  return `<div class="swatches">${list.map(x=>`<div class="sw ${c.decor===x.code?'sel':''}" data-action="setDecor" data-mod="${mod}" data-id="${x.code}">
    <div class="chipc" style="background:${x.hex};color:${txtOn(x.hex)};text-shadow:none">${x.surf!=='FH'?x.surf:''}</div>
    <div class="meta"><div class="code">${x.code}</div><div class="nm">${esc(x.name)}</div>
      <span class="badge ${x.stock>0?'in':'out'}">${x.stock>0?'В наявності: '+x.stock+' л.':'Під замовлення'}</span></div></div>`).join('')}</div>`;
}
function materialStep(c,mod){
  return `<h2>Матеріал та декор</h2>

    <div class="matbar">
      <input type="search" placeholder="Пошук декору / коду" data-filter="search" data-mod="${mod}" value="${esc(state.matFilter.search)}">
      <label><input type="checkbox" data-filter="stock" data-mod="${mod}" ${state.matFilter.stock?'checked':''}> лише в наявності</label>

}
function stepper(path,val,min,max){
  return `<div class="stepper">
    <button data-action="dec" data-path="${path}" data-min="${min}">−</button>
    <input type="number" data-field="${path}" value="${val}" min="${min}" max="${max}">

/* ---------- aside ---------- */
function renderAside(mod){
  const isC=mod==='cabins';
  const c=state[mod];
  const steps=isC?CABIN_STEPS:COUNTER_STEPS;
  const last=c.step===steps.length-1;
  let sketch,lines,subtotal;
  if(isC){
    const p=priceCabins(c);
    subtotal=p.subtotal;
    const r=c.rooms[c.active]||c.rooms[0];
    const dec=decorBy(c.decor);
    sketch=sketchRoom(r,p.type,dec?dec.hex:'#9aa3a8');
    if(r&&r.kind==='каб'&&c.step>=1){
      sketch+=`<div class="ttl" style="margin-top:14px">Вид зверху · ${esc((VIDS.find(v=>v.id===r.vid)||VIDS[0]).name)}</div>`
        +sketchTopView({facade:r.facade,depth:r.depth,vid:r.vid,cabs:cabsOf(r),parts:Math.max(0,((r.nStd||0)+(r.nInc||0))-1),hex:dec?dec.hex:null,labeled:false});
    }
    lines=p.rooms.map(x=>`<div class="ln"><span>${esc(x.room.name)} (${x.area.toFixed(2)} м²)</span><span>${money(x.cost)}</span></div>`).join('')
      +`<div class="ln"><span>Ставка</span><span>${CONFIG.cabins.ratePerM2} €/м²</span></div>
        <div class="ln tot"><span>За позицію</span><span>${money2(subtotal)}</span></div>`;
  }else{
    const p=priceCounters(c);
    subtotal=p.subtotal;
    sketch=sketchCounter(c);
    lines=`<div class="ln"><span>Матеріал (${p.area.toFixed(2)} м² × ${p.m2} €)</span><span>${money(p.material)}</span></div>
      <div class="ln"><span>Торець (${p.edgeM.toFixed(2)} м × ${p.edgeRate} €)</span><span>${money(p.edgeCost)}</span></div>
      ${p.cutCost?`<div class="ln"><span>Вирізи ×${c.cutouts}</span><span>${money(p.cutCost)}</span></div>`:''}
      ${p.mixCost?`<div class="ln"><span>Змішувач ×${c.mixer}</span><span>${money(p.mixCost)}</span></div>`:''}
      <div class="ln tot"><span>За позицію</span><span>${money2(subtotal)}</span></div>`;
  }
  if(c.step===0){ // тип/форма: без ціни; для кабін — і без прев'ю (з'явиться на «Приміщенні»)
    state._last[mod]=subtotal;
    const ok0=canProceed(mod);
    return `
  ${isC?'':`<div class="preview"><div class="ttl">Конфігурація</div>${sketch}</div>`}
  <div class="summary">
    <div class="plabel">Розрахунок</div>
    <div class="aside-hint" style="font-size:13.5px;color:var(--ink-soft);margin:10px 0 4px;line-height:1.55">Орієнтовна вартість з'явиться на кроці «${isC?'Приміщення':'Розміри'}».</div>
    <div class="nav no-print">
      <button class="btn primary" data-action="next" data-mod="${mod}" ${ok0?'':'disabled'}>Далі →</button>
    </div>
  </div>`;
  }
  const prev=state._last[mod];
  const bump=prev!==undefined&&Math.round(prev)!==Math.round(subtotal)?'bump':'';
  if(bump) state._anim={from:prev,to:subtotal};
  state._last[mod]=subtotal;
  const ok=canProceed(mod);
  return `
  <div class="preview"><div class="ttl">Конфігурація</div>${sketch}</div>
  <div class="summary">
    <div class="plabel">Орієнтовна вартість</div>
    <div class="price ${bump}">${money2(subtotal)}</div>
    <div class="uah">${uah(subtotal)}</div>
    <div class="lines">${lines}</div>
    <div class="nav no-print">
      ${c.step>0?`<button class="btn ghost" data-action="prev" data-mod="${mod}">Назад</button>`:''}
      ${last
        ? `<button class="btn primary" data-action="addEstimate" data-mod="${mod}">＋ До кошторису</button>`
        : `<button class="btn primary" data-action="next" data-mod="${mod}" ${ok?'':'disabled'}>Далі →</button>`}
    </div>
    ${!ok?`<div class="note err" role="alert">${wizardError(mod)}</div>`:`<div class="note">Ціни з бази CALCULATOR (EUR). Залишки — знімок складу; живий зв'язок з 1С — наступна фаза.</div>`}
  </div>`;
}
function refreshAside(mod){ const el=document.getElementById('aside'); if(el){ el.innerHTML=renderAside(mod); animPrice(); } }

function viewEstimate(){

  }
  const t=estimateTotals();
  const cl=state.client;
  const rows=state.estimate.map(it=>`<div class="est-item">

      <button class="rm" data-action="removeItem" data-id="${it.id}" title="Видалити">✕</button>
    </div>`).join('');
  const okQuote=contactOk();
  return `
  <div class="page-title"><span class="crumb" data-action="goHome">Калькулятор</span><span class="sep">›</span><b>Кошторис</b></div>
  <div class="est">
    <div>

      <button class="btn ghost" data-action="goHome" style="margin-top:14px">＋ Додати ще позицію</button>
      <div class="formcard">
        <div class="plabel" style="font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut);font-weight:600;margin-bottom:14px">Контактні дані</div>
        <div class="row">
          <div class="field"><label>Ім'я</label><input class="inp" data-field="client.name" value="${esc(cl.name)}"></div>
          <div class="field"><label>Прізвище</label><input class="inp" data-field="client.surname" value="${esc(cl.surname)}"></div>
        </div>
        <div class="row">
          <div class="field"><label>Телефон</label><input class="inp" type="tel" data-field="client.phone" value="${esc(cl.phone)}"></div>
          <div class="field"><label>Email</label><input class="inp" type="email" data-field="client.email" value="${esc(cl.email)}"></div>
        </div>
        <div class="field"><label>Компанія</label><input class="inp" data-field="client.company" value="${esc(cl.company)}"></div>
        <div class="field only-mobile"><label>Цінова категорія</label><select class="inp" data-field="client.priceCat">${PRICE_CATS.map(p=>`<option ${cl.priceCat===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="field" style="margin-bottom:0"><label>Коментар</label><textarea class="inp" rows="2" data-field="client.comment">${esc(cl.comment)}</textarea></div>
      </div>
    </div>
    <div class="aside">
      <div class="summary">
        <div class="plabel">Підсумок</div>
        <div class="field" style="margin-top:12px"><label>Цінова категорія</label><select class="inp" data-field="client.priceCat">${PRICE_CATS.map(p=>`<option ${cl.priceCat===p?'selected':''}>${p}</option>`).join('')}</select></div>
        <div class="lines">
          <div class="ln"><span>Позицій</span><span>${state.estimate.reduce((a,i)=>a+i.qty,0)}</span></div>
          <div class="ln"><span>Сума</span><span>${money(t.subtotal)}</span></div>

          <div class="ln tot"><span>Разом</span><span>${money2(t.total)}</span></div>

/* ============================================================
   8) ACTIONS
   ============================================================ */
function addToEstimate(mod){
  let title,meta,unitBase;
  if(mod==='cabins'){
    const c=state.cabins;
    const p=priceCabins(c); const dec=decorBy(c.decor);
    title=p.type.name;
    const hx=dec?dec.hex:'#9aa3a8';
    var sk=p.rooms.map(x=>sketchRoom(x.room,p.type,hx)).join('');
    meta=p.rooms.map(x=>{
      const r=x.room;
      if(r.kind==='каб') return `${r.name}: фасад ${r.facade}×${r.depth} мм, двері ${r.nStd?r.nStd+'×'+r.wStd:''}${r.nStd&&r.nInc?'+':''}${r.nInc?r.nInc+'×'+r.wInc+' інкл.':''}, ${x.area.toFixed(2)} м²`;
      return `${r.name}: ${r.pn}×${r.pw} мм, ${x.area.toFixed(2)} м²`;
    }).join('\n')+`\n${dec?dec.code+' '+dec.name:''} · FH · ${dec?dec.core:''} · ${fitText(p.type)}`;
    unitBase=p.subtotal;
  }else{
    const c=state.counters;
    const p=priceCounters(c); const sh=SHAPES.find(x=>x.id===c.shape);
    title='Стільниця '+sh.name;
    var sk=sketchCounter(c);
    meta=`${p.area.toFixed(2)} м² · ${p.edgeName} · вирізів ${c.cutouts}${c.mixer?' · змішувач '+c.mixer:''} · ${p.dec?p.dec.code+' '+p.dec.name:''}`;
    unitBase=p.subtotal;
  }
  state.estimate.push({ id:'it'+Date.now()+Math.floor(Math.random()*1000), mod, title, meta, unitBase, qty:1, sketch:sk||'' });
  track('add_to_estimate',{product:mod,total:Math.round(unitBase)});
  toast('Додано до кошторису ✓');
}
let toastTimer=null;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent=msg; requestAnimationFrame(()=>el.classList.add('show'));
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function refreshAcctBox(){ const b=document.getElementById('acctbox'); if(b) b.innerHTML=acctBoxHtml(); updateAcct(); }

document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const a=el.dataset.action, mod=el.dataset.mod;
  const cb=state.cabins;
  switch(a){
    case 'goHome': state.screen='home'; render(); break;
    case 'gateGo': if(contactOk()){ state.editGate=false;
      track('gate_submitted',{returning:!!state.client.accountId}); render(); }
      else toast("Заповніть ім'я, прізвище і телефон"); break;
    case 'gateEdit': state.editGate=true; state.screen='home'; render(); break;
    case 'openCabins': state.screen='cabins'; track('product_selected',{product:'cabins'}); render(); break;
    case 'openCounters': state.screen='counters'; track('product_selected',{product:'counters'}); render(); break;
    case 'openEstimate': state.screen='estimate'; render(); break;
    case 'setStep':{ const m=el.dataset.mod, n=+el.dataset.n, st=state[m];
      if(n>st.step&&!canProceed(m))break; st.step=n; render(); break; }
    case 'next':{ if(!canProceed(mod))break; const st=state[mod]; const max=(mod==='cabins'?CABIN_STEPS:COUNTER_STEPS).length-1; st.step=Math.min(max,st.step+1); render(); break; }
    case 'prev': state[mod].step=Math.max(0,state[mod].step-1); render(); break;
    case 'setCabinType':{ cb.type=el.dataset.id;
      const t=typeBy(cb.type); if(!t.fit.includes(cb.fittings)) cb.fittings=t.fit[0]; render(); break; }
    case 'setShape': state.counters.shape=el.dataset.id; render(); break;
    case 'setEdge': state.counters.edge=+el.dataset.n; render(); break;
    case 'setDecor': state[el.dataset.mod].decor=el.dataset.id; render(); break;
    case 'roomSel': cb.active=+el.dataset.n; render(); break;
    case 'roomDel':{ e.stopPropagation(); const n=+el.dataset.n;
      cb.rooms.splice(n,1); if(!cb.rooms.length)cb.rooms=[defaultRoom(1)];
      cb.active=Math.min(cb.active,cb.rooms.length-1); render(); break; }
    case 'roomAdd': cb.rooms.push(defaultRoom(cb.rooms.length+1)); cb.active=cb.rooms.length-1; render(); break;
    case 'roomVid':{ const rr=cb.rooms[cb.active]; rr.vid=el.dataset.id;
      rr.corners=(VIDS.find(v=>v.id===rr.vid)||VIDS[0]).sides; render(); break; }
    case 'roomNum': setPath(state,el.dataset.path,+el.dataset.v); render(); break;
    case 'inc':{ const p=el.dataset.path; setPath(state,p,Math.min(+el.dataset.max||999,(getPath(p)||0)+1)); render(); break; }
    case 'dec':{ const p=el.dataset.path; setPath(state,p,Math.max(+el.dataset.min||0,(getPath(p)||0)-1)); render(); break; }
    case 'addEstimate': addToEstimate(mod); partialLead(); state.screen='estimate'; render(); break;
    case 'estInc':{ const it=state.estimate.find(x=>x.id===el.dataset.id); if(it){it.qty++; render();} break; }
    case 'estDec':{ const it=state.estimate.find(x=>x.id===el.dataset.id); if(it){it.qty=Math.max(1,it.qty-1); render();} break; }
    case 'removeItem': state.estimate=state.estimate.filter(x=>x.id!==el.dataset.id); render(); break;
    case 'makeQuote': if(contactOk()){
      state.quoteNum='КП-'+new Date().getFullYear()+'/'+String(Math.floor(Math.random()*9000+1000));
      state.prevScreen='estimate'; state.screen='quote';
      track('quote_generated',{quote:state.quoteNum,total:Math.round(estimateTotals().total)});
      submitLead();
      render(); } break;
    case 'backFromQuote': state.screen='estimate'; render(); break;
    case 'printQuote': track('quote_printed',{quote:state.quoteNum}); window.print(); break;
    case 'acctYes':{ const acc=getAccounts().find(x=>x.id===el.dataset.id);
      if(acc){ Object.assign(state.client,{name:acc.name,surname:acc.surname||'',phone:acc.phone||state.client.phone,
        email:acc.email||state.client.email,company:acc.company||'',priceCat:acc.priceCat||'Прайс 1',accountId:acc.id});
        state.lookup.dismissed=false; toast('Вітаємо, '+acc.name+'! Застосовано '+(acc.priceCat||'Прайс 1')); render(); }
      break; }
    case 'acctNo': state.lookup.dismissed=true; refreshAcctBox(); break;
    case 'acctLogout': sessionPin=null; state.client.accountId=null; state.client.priceCat='Прайс 1'; state.lookup.dismissed=false; render(); break;
    case 'acctLoginPin': doLogin(); break;
    case 'acctRegister': doRegister(); break;
    case 'acctForgot': doRequestReset(state.client.email); break;
    case 'openCabinet': openCabinet(); break;
  }
});
function onField(el){
  const path=el.dataset.field; let v=el.value;
  if(el.type==='checkbox') v=!!el.checked;
  else if(el.type==='number') v=parseFloat(v)||0;
  setPath(state,path,v); save();
  if(el.dataset.lookup){ state.lookup.dismissed=false; backendLookup(); refreshAcctBox(); }
  if(path==='client.priceCat'){ render(); return; }
  if(path.startsWith('client.')){
    const b=document.getElementById('mkq');
    if(b){ b.disabled=!contactOk();
      const note=b.nextElementSibling; if(note) note.textContent=contactOk()?'Готово до формування пропозиції.':"Вкажіть ім'я, прізвище та телефон."; }
    const g=document.getElementById('gatego'); if(g) g.disabled=!contactOk();
    const aside=document.getElementById('aside'); if(aside){ const mod=state.screen; if(mod==='cabins'||mod==='counters') refreshAside(mod); }
    updateAcct(); return;
  }
  const mod=path.split('.')[0];
  if(mod==='cabins'||mod==='counters') refreshAside(mod);
  if(path.indexOf('cabins.rooms.')===0){
    if(/\.kind$/.test(path)){ render(); return; }   // зміна типу приміщення — перемалювати поля
    const t=typeBy(state.cabins.type), r=state.cabins.rooms[state.cabins.active];
    const ra=document.getElementById('roomarea');
    if(ra&&r) ra.textContent=roomArea(r,t).toFixed(2)+' м²';
    const de=document.getElementById('dimserr');
    if(de&&r){ const pr=roomDimsProblem(r);
      de.textContent=pr; de.style.display=pr?'':'none'; }
    if(el.classList){
      if(/\.depth$/.test(path)) el.classList.toggle('bad', r.depth<CONFIG.cabins.depthMin||r.depth>CONFIG.cabins.depthMax);
      if(/\.facade$/.test(path)) el.classList.toggle('bad', r.facade<CONFIG.cabins.cabinMinWidth);
    }
  }
}
function onFilter(el){
  const f=el.dataset.filter, mod=el.dataset.mod;
  if(f==='stock') state.matFilter.stock=el.checked; else state.matFilter[f]=el.value;
  const g=document.getElementById('swgrid'); if(g){ g.innerHTML=swGrid(mod); a11y(); }
}
document.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&e.target&&e.target.getAttribute&&e.target.getAttribute('role')==='button'){
    e.preventDefault(); e.target.click();
  }
});
document.addEventListener('input',e=>{ const f=e.target.closest('[data-filter]'); if(f){onFilter(f);return;} const el=e.target.closest('[data-field]'); if(el) onField(el); });
document.addEventListener('change',e=>{ const f=e.target.closest('[data-filter]'); if(f){onFilter(f);return;} const el=e.target.closest('[data-field]'); if(el) onField(el); });

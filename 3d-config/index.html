<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="description" content="BUDZIRKA — 3D-конфігуратор сантехнічних кабін: налаштуйте виріб у реальному часі." />
<title>BUDZIRKA · 3D-конфігуратор</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23274C4F'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='700' fill='white' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#274C4F; --brand-2:#456A6D; --brand-3:#42504b; --ink:#152420; --ink-soft:#3c4a46; --ink-mut:#5f6f6a;
  --bg:#FBFCFC; --surface:#EEF4F5; --surface-2:#E2EDEF; --white:#fff; --border:#dbe6e6; --border-2:#cddbdb;
  --brand-soft:#e6f0f0; --ok:#2e7d5b; --ok-soft:#e4f2ea; --err:#a5471f; --err-soft:#f7e8e0;
  --shadow:0 2px 6px rgba(21,36,32,.06),0 14px 34px rgba(21,36,32,.10);
  --shadow-lg:0 24px 70px rgba(21,36,32,.18);
  --r:16px; --r-sm:11px; --r-pill:100px; --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--ink);
  background:radial-gradient(125% 100% at 38% 0%, #ffffff 0%, #f1f6f7 55%, #e2edf0 100%)}
button{font-family:inherit;cursor:pointer;border:none;background:none}
#stage{position:fixed;inset:0}
#stage canvas{display:block;touch-action:none}
#labels{position:fixed;inset:0;pointer-events:none;z-index:3;overflow:hidden}
.dimlabel{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:2px 8px;font-size:11.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow);font-variant-numeric:tabular-nums;white-space:nowrap}

.topbar{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;gap:11px;padding:14px 22px;pointer-events:none}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:32px;height:32px;border-radius:9px;background:var(--brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:17px;box-shadow:var(--shadow)}
.logo b{font-size:17px;letter-spacing:.5px}.logo span{color:var(--ink-mut);font-size:13px;margin-left:2px}

/* панель керування */
.panel{position:fixed;top:0;right:0;bottom:0;width:392px;z-index:5;background:rgba(255,255,255,.9);
  backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);
  border-left:1px solid var(--border);box-shadow:-20px 0 60px rgba(21,36,32,.08);
  display:flex;flex-direction:column;overflow:hidden}
.panel .ph{padding:18px 22px 12px}
.panel .ph .pl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-mut);font-weight:700}
.panel .ph h1{margin:4px 0 0;font-size:21px;letter-spacing:-.3px}
.panel .body{flex:1;overflow-y:auto;padding:6px 22px 16px}
.panel .body::-webkit-scrollbar{width:8px}.panel .body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:9px}

.sect{margin:16px 0 0}
.sect h4{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-mut);font-weight:700}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{border:1.5px solid var(--border);background:var(--white);border-radius:var(--r-pill);padding:8px 15px;font-size:13px;font-weight:600;color:var(--ink-soft);transition:.14s}
.chip:hover{border-color:var(--brand-2)}
.chip.sel{background:var(--brand);border-color:var(--brand);color:#fff}
.optgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.opt{border:1.5px solid var(--border);background:var(--white);border-radius:var(--r-sm);padding:11px 10px;text-align:left;transition:.14s}
.opt:hover{border-color:var(--brand-2)}
.opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.opt .t{font-weight:600;font-size:13px}.opt .d{font-size:11px;color:var(--ink-soft);margin-top:2px}

.fld{margin:12px 0 0}
.fld .lab{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;font-weight:600;margin-bottom:7px}
.fld .lab span{color:var(--ink-mut);font-weight:600;font-variant-numeric:tabular-nums}
.rng{display:flex;align-items:center;gap:11px}
.rng input[type=range]{flex:1;-webkit-appearance:none;height:5px;border-radius:9px;background:var(--surface-2);outline:none}
.rng input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--brand);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25);border:2.5px solid #fff}
.rng input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--brand);cursor:pointer;border:2.5px solid #fff}
.rng .num{width:78px;border:1.5px solid var(--border);border-radius:9px;padding:8px 9px;font-size:13.5px;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.rng .num:focus{outline:none;border-color:var(--brand)}
.ro{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13.5px;color:var(--ink-soft);font-weight:600}

.stepper{display:inline-flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.stepper button{width:38px;height:38px;background:var(--surface);font-size:18px;color:var(--brand)}
.stepper button:hover{background:var(--brand-soft)}
.stepper input{width:50px;border:none;text-align:center;font-weight:600;font-size:14.5px}
.stepper input:focus{outline:none}
.row2{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap}

.sws{display:grid;grid-template-columns:repeat(auto-fill,minmax(58px,1fr));gap:8px}
.sw{border:2px solid transparent;border-radius:10px;overflow:hidden;cursor:pointer;transition:.14s;background:var(--white);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.sw .c{height:42px}
.sw .n{font-size:9.5px;font-weight:700;padding:3px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink-soft)}
.sw.sel{border-color:var(--brand)}
.sw .badge{display:block;font-size:8.5px;color:var(--ok)}.sw .badge.out{color:var(--err)}
.info{background:var(--surface);border-radius:9px;padding:10px 12px;font-size:12.5px;color:var(--ink-soft);line-height:1.5}
.info b{color:var(--ink)}
.errmsg{background:var(--err-soft);color:var(--err);border-radius:9px;padding:9px 12px;font-size:12.5px;margin-top:10px;font-weight:500}

/* підвал з ціною */
.foot{border-top:1px solid var(--border);padding:14px 22px calc(14px + env(safe-area-inset-bottom));background:rgba(255,255,255,.7)}
.foot .price{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:11px}
.foot .price .pl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-mut);font-weight:700}
.foot .price .pv{font-size:30px;font-weight:800;letter-spacing:-.6px;font-variant-numeric:tabular-nums}
.foot .price .pv.bump{animation:bump .25s ease}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.05)}100%{transform:scale(1)}}
.foot .uah{font-size:12.5px;color:var(--ink-mut);font-variant-numeric:tabular-nums}
.btn{width:100%;border:1.5px solid var(--brand);background:var(--brand);color:#fff;padding:14px;border-radius:var(--r-pill);font-size:15px;font-weight:700;transition:.15s;min-height:50px}
.btn:hover{background:var(--brand-2);border-color:var(--brand-2)}
.btn.ghost{background:var(--white);color:var(--ink);border-color:var(--border)}
.btn.ghost:hover{border-color:var(--brand);color:var(--brand)}

/* 3D міні-контролі */
.vctrl{position:fixed;left:22px;bottom:22px;z-index:6;display:flex;gap:6px;background:rgba(255,255,255,.84);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:var(--r-pill);box-shadow:var(--shadow);padding:6px}
.vbtn{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;color:var(--ink-soft);transition:.14s;position:relative}
.vbtn:hover{background:var(--brand-soft);color:var(--brand)}.vbtn.on{background:var(--brand);color:#fff}
.vbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.vbtn .tip{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:11px;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;transition:.15s;pointer-events:none}
.vbtn:hover .tip{opacity:1}

/* модалка заявки */
.modal{position:fixed;inset:0;z-index:30;background:rgba(21,36,32,.4);display:none;place-items:center;padding:18px}
.modal.show{display:grid}
.modal .m{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-lg);max-width:420px;width:100%;padding:26px}
.modal h3{margin:0 0 4px;font-size:20px}.modal p{margin:0 0 16px;color:var(--ink-soft);font-size:13.5px}
.modal .f{margin-bottom:12px}.modal label{display:block;font-size:12.5px;font-weight:600;margin-bottom:6px}
.modal .in{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;font-size:14.5px}
.modal .in:focus{outline:none;border-color:var(--brand)}
.modal .x{float:right;font-size:20px;color:var(--ink-mut);margin:-6px -6px 0 0}

.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:13px 22px;border-radius:var(--r-pill);font-size:14px;box-shadow:var(--shadow-lg);z-index:40;transition:.28s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loader{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:var(--brand);color:#fff;transition:opacity .6s}
.loader.hide{opacity:0;pointer-events:none}
.loader .mk{width:62px;height:62px;border-radius:17px;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:31px;margin:0 auto 18px;animation:pf 1.6s ease-in-out infinite}
@keyframes pf{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.loader .bar{width:184px;height:3px;border-radius:99px;background:rgba(255,255,255,.22);margin:0 auto;overflow:hidden}
.loader .bar i{display:block;height:100%;width:32%;background:#fff;border-radius:99px;animation:ld 1.15s ease-in-out infinite}
@keyframes ld{0%{margin-left:-32%}100%{margin-left:100%}}
.loader p{margin:16px 0 0;color:#cfe0e1;font-size:13.5px}

@media (max-width:860px){
  .panel{top:auto;left:0;right:0;bottom:0;width:auto;max-height:56vh;border-left:none;border-top:1px solid var(--border);border-radius:20px 20px 0 0}
  .panel .ph{padding:12px 18px 6px}.panel .ph h1{font-size:18px}
  .panel .body{padding:4px 18px 12px}
  .optgrid{grid-template-columns:1fr 1fr 1fr}
  .vctrl{bottom:auto;top:64px;left:12px}
  .topbar span{display:none}
}
</style>
</head>
<body>
<div id="stage"></div><div id="labels"></div>
<div class="loader" id="loader"><div style="text-align:center"><div class="mk">B</div><div class="bar"><i></i></div><p>Завантажуємо 3D-конфігуратор…</p></div></div>

<div class="topbar"><div class="logo"><div class="mark">B</div><b>BUDZIRKA</b><span>3D-конфігуратор</span></div></div>

<div class="vctrl" id="vctrl"></div>

<aside class="panel">
  <div class="ph"><div class="pl">Конфігуратор</div><h1>Сантехнічна кабіна</h1></div>
  <div class="body" id="body"></div>
  <div class="foot">
    <div class="price"><div><div class="pl">Орієнтовна вартість</div><div class="pv" id="priceV">—</div><div class="uah" id="priceU"></div></div></div>
    <div style="display:flex;gap:9px">
      <button class="btn ghost" style="flex:0 0 auto;width:auto;padding:14px 18px" id="resetBtn">↺</button>
      <button class="btn" id="orderBtn">Сформувати заявку →</button>
    </div>
  </div>
</aside>

<div class="modal" id="modal"><div class="m">
  <button class="x" onclick="closeModal()">✕</button>
  <h3>Залиште контакти</h3><p>Менеджер підтвердить наявність і зафіксує ціну.</p>
  <div class="f"><label>Ім'я *</label><input class="in" id="mName" placeholder="Ім'я"></div>
  <div class="f"><label>Телефон *</label><input class="in" id="mPhone" type="tel" placeholder="+380…"></div>
  <div class="f"><label>Email</label><input class="in" id="mEmail" type="email" placeholder="email@…"></div>
  <button class="btn" id="mSend">Надіслати заявку</button>
  <div class="errmsg" id="mErr" style="display:none"></div>
</div></div>

<div class="toast" id="toast"></div>

<script>
window.addEventListener('error',e=>{ const l=document.getElementById('loader');
  if(l&&!window.__ready){ l.innerHTML='<div style="text-align:center;padding:0 24px;max-width:360px"><div class="mk" style="background:#fff;animation:none">!</div><p style="color:#fff">Помилка завантаження<br><span style="font-size:11px;word-break:break-word">'+((e.message||'')+(e.filename?(' — '+String(e.filename).split('/').pop()):''))+'</span></p></div>'; }});
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============ дані (fallback; каталог тягнемо з бази) ============ */
const SB={ url:'https://eymmfzpcuuibufondxfv.supabase.co',
  key:'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5bW1menBjdXVpYnVmb25keGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNjM0ODMsImV4cCI6MjA5MzYzOTQ4M30.4LqMeLcuCGRBaXcEQJI6T0B01LpL_zTXghdIbV2JY9E' };
let TYPES=[
  {id:'standart',name:'MAX Standart',h:2100,fit:['inox'],rail:true},
  {id:'tube',name:'Max Tube',h:2100,fit:['inox','alu'],rail:true},
  {id:'top',name:'Max Top',h:2100,fit:['inox'],rail:false},
  {id:'kids',name:'Max Kids',h:2100,fit:['inox'],rail:true},
  {id:'inclusive',name:'Max Inclusive',h:2100,fit:['inox'],rail:true},
  {id:'comb',name:'Max Comb',h:2100,fit:['inox'],rail:true},
];
let DECORS=[
  {code:'0085',name:'Білий',hex:'#f1efe9',stock:9},{code:'0074',name:'Pastel Grey',hex:'#c7c7c1',stock:2.5},
  {code:'0077',name:'Charcoal',hex:'#4b4f52',stock:7.5},{code:'0080',name:'Чорний',hex:'#1d1d1f',stock:4},
];
let SET={ rate:170, eurUah:52.06 };
const FIT={inox:'нержавіюча сталь',alu:'анодований алюміній'};
const VIDS=[{id:'між',name:'міжстінна',sides:0,desc:'Між двома стінами'},{id:'кут',name:'кутова',sides:1,desc:'Одна бічна панель'},{id:'окр',name:'окрема',sides:2,desc:'Дві бічні панелі'}];

/* ============ стан ============ */
const S={ type:'standart', vid:'кут', depth:1200, facade:4000, nStd:3, wStd:650, nInc:0, wInc:900,
  decor:'0077', doorsOpen:false, dims:false, auto:true };
const DEPTH_MIN=1200,DEPTH_MAX=1500,CABIN_MIN=1100,SIDE=200;
function typeBy(id){ return TYPES.find(t=>t.id===id)||TYPES[0]; }
function decorBy(c){ return DECORS.find(d=>d.code===c)||DECORS[0]; }
function fitText(t){ return (t.fit||['inox']).map(f=>FIT[f]||f).join(' та '); }
function cabinMinW(door){ return Math.max(CABIN_MIN, door+2*SIDE); }
function parts(){ const sides=(VIDS.find(v=>v.id===S.vid)||VIDS[0]).sides; return Math.max(0,(S.nStd+S.nInc)-1+sides); }
function area(){ const t=typeBy(S.type), H=t.h/1000; return (S.facade/1000)*H + parts()*(S.depth/1000)*H; }
function price(){ return area()*SET.rate; }
function dimsErr(){
  if(S.depth<DEPTH_MIN||S.depth>DEPTH_MAX) return 'Глибина '+S.depth+' мм — поза межами '+DEPTH_MIN+'–'+DEPTH_MAX+' мм.';
  const need=S.nStd*cabinMinW(S.wStd)+S.nInc*cabinMinW(S.wInc);
  if(need>S.facade) return 'Не вміщується: '+(S.nStd+S.nInc)+' кабін потребують ≥ '+need.toLocaleString('uk-UA')+' мм, фасад '+S.facade.toLocaleString('uk-UA')+' мм.';
  return '';
}

/* ============ сцена ============ */
const stage=document.getElementById('stage');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; stage.appendChild(renderer.domElement);
const labelR=new CSS2DRenderer(); labelR.setSize(innerWidth,innerHeight);
Object.assign(labelR.domElement.style,{position:'fixed',top:'0',left:'0',pointerEvents:'none'}); document.getElementById('labels').appendChild(labelR.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.05,200);
scene.environment=new THREE.PMREMGenerator(renderer).fromScene(new RoomEnvironment(),0.04).texture;
scene.add(new THREE.HemisphereLight(0xffffff,0xdfe7e8,0.85));
const key=new THREE.DirectionalLight(0xffffff,2.1); key.position.set(4.5,7.5,5.5); key.castShadow=true;
key.shadow.mapSize.set(2048,2048); key.shadow.bias=-0.0002; key.shadow.normalBias=0.02;
key.shadow.camera.near=1; key.shadow.camera.far=60; key.shadow.camera.left=-12; key.shadow.camera.right=12; key.shadow.camera.top=12; key.shadow.camera.bottom=-12; key.shadow.camera.updateProjectionMatrix(); scene.add(key);
const fl=new THREE.DirectionalLight(0xffffff,0.5); fl.position.set(-6,4,-3); scene.add(fl);
const rl=new THREE.DirectionalLight(0xeaf2f3,0.6); rl.position.set(-2,5,-7); scene.add(rl);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,80),new THREE.ShadowMaterial({opacity:0.20})); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

const decorMat=new THREE.MeshPhysicalMaterial({color:new THREE.Color(decorBy(S.decor).hex),roughness:0.62,metalness:0,clearcoat:0.22,clearcoatRoughness:0.45,envMapIntensity:0.7,reflectivity:0.18});
const chrome=new THREE.MeshStandardMaterial({color:0xcfd4d8,metalness:0.96,roughness:0.27,envMapIntensity:1.25});
const darkMetal=new THREE.MeshStandardMaterial({color:0x394046,metalness:0.85,roughness:0.42});
const coreEdge=new THREE.LineBasicMaterial({color:0x14181b,transparent:true,opacity:0.5});
const incMat=new THREE.MeshStandardMaterial({color:0x2c5f8a,roughness:0.5});
const colorTarget=new THREE.Color(decorBy(S.decor).hex);
const THICK=0.012;
function at(o,x,y,z){ o.position.set(x,y,z); return o; }
function panel(w,h,d){ const g=new THREE.BoxGeometry(w,h,d); const m=new THREE.Mesh(g,decorMat); m.castShadow=true; m.receiveShadow=true; m.add(new THREE.LineSegments(new THREE.EdgesGeometry(g),coreEdge)); return m; }
function tube(len,r,mat,horiz){ const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,20),mat); m.castShadow=true; if(horiz) m.rotation.z=Math.PI/2; return m; }

let root=new THREE.Group(); scene.add(root);
let doorPivots=[], dimsGroup=null, firstBuild=true;
function clearRoot(){ root.traverse(o=>{
    if(o.isCSS2DObject&&o.element&&o.element.parentNode) o.element.parentNode.removeChild(o.element);
    if(o.geometry&&o!==ground&&o.geometry.dispose) o.geometry.dispose(); });
  scene.remove(root); root=new THREE.Group(); scene.add(root); doorPivots=[]; dimsGroup=null; }
function dimLabel(t,x,y,z){ const d=document.createElement('div'); d.className='dimlabel'; d.textContent=t; const o=new CSS2DObject(d); o.position.set(x,y,z); return o; }
function dimLine(a,b){ return new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:0x9fb0ab})); }

function build(){
  clearRoot();
  const t=typeBy(S.type), H=t.h/1000, D=S.depth/1000, F=Math.max(S.facade/1000,0.6);
  const sides=(VIDS.find(v=>v.id===S.vid)||VIDS[0]).sides;
  const cabs=[]; for(let i=0;i<S.nStd;i++) cabs.push({door:S.wStd,inc:false}); for(let i=0;i<S.nInc;i++) cabs.push({door:S.wInc,inc:true});
  if(!cabs.length) cabs.push({door:S.wStd,inc:false});
  const n=cabs.length, mins=cabs.map(c=>cabinMinW(c.door)/1000);
  const extra=Math.max(0,(F-mins.reduce((a,b)=>a+b,0)))/n, widths=mins.map(m=>m+extra), bx=[0];
  widths.forEach(w=>bx.push(bx[bx.length-1]+w));
  const total=bx[bx.length-1], offX=-total/2, offZ=-D/2, X=x=>x+offX;
  root.add(at(panel(total,H,THICK),X(total/2),H/2,offZ)); // задня панель
  const partAt=new Set(); for(let i=1;i<n;i++) partAt.add(i); if(sides>=1) partAt.add(n); if(sides>=2) partAt.add(0);
  partAt.forEach(i=>{ root.add(at(panel(THICK,H,D),X(bx[i]),H/2,offZ+D/2));
    [offZ+0.06,offZ+D-0.06].forEach(z=>{ root.add(at(tube(0.085,0.013,chrome),X(bx[i]),0.043,z));
      const foot=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.034,0.018,18),chrome); foot.castShadow=true; root.add(at(foot,X(bx[i]),0.009,z)); }); });
  cabs.forEach((c,i)=>{ const cx=(bx[i]+bx[i+1])/2, dw=Math.min(c.door/1000,widths[i]-0.04);
    const pivot=new THREE.Group(); pivot.position.set(X(cx-dw/2),H/2,offZ+D-THICK/2);
    const door=panel(dw,H-0.02,THICK); door.position.set(dw/2,0,0); pivot.add(door);
    [-(H-0.02)/2+0.20,0,(H-0.02)/2-0.20].forEach(hy=>{ const hg=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.085,0.03),darkMetal); hg.position.set(0.01,hy,0.02); hg.castShadow=true; pivot.add(hg); });
    const lock=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,0.02,20),chrome); lock.rotation.x=Math.PI/2; lock.position.set(dw-0.07,1.05-H/2,0.016); pivot.add(lock);
    if(c.inc){ const m=new THREE.Mesh(new THREE.CircleGeometry(0.09,28),incMat); m.position.set(dw/2,1.45-H/2,0.014); pivot.add(m); }
    root.add(pivot); doorPivots.push(pivot); });
  if(t.rail){ const railY=H+0.03, railZ=offZ+D-0.02;
    root.add(at(tube(total+0.16,0.016,chrome,true),X(total/2),railY,railZ));
    const posts=new Set([...partAt]); posts.add(0); posts.add(n);
    posts.forEach(i=> root.add(at(tube(0.10,0.012,chrome),X(bx[i]),H,railZ))); }
  // dims — лише коли увімкнено
  if(S.dims){
    dimsGroup=new THREE.Group(); root.add(dimsGroup);
    const hx=total/2, fz=offZ+D;
    dimsGroup.add(dimLine(new THREE.Vector3(-hx,0.01,fz+0.14),new THREE.Vector3(hx,0.01,fz+0.14)));
    dimsGroup.add(dimLabel(S.facade+' мм',0,0.07,fz+0.14));
    dimsGroup.add(dimLine(new THREE.Vector3(-hx-0.14,0,fz),new THREE.Vector3(-hx-0.14,H,fz)));
    dimsGroup.add(dimLabel(t.h+' мм',-hx-0.14,H/2,fz));
    dimsGroup.add(dimLine(new THREE.Vector3(hx+0.14,0.01,offZ),new THREE.Vector3(hx+0.14,0.01,fz)));
    dimsGroup.add(dimLabel(S.depth+' мм',hx+0.14,0.07,offZ+D/2));
  }
  if(firstBuild){ frameCamera(true); firstBuild=false; }
}
let center=new THREE.Vector3(), camDist=6;
function frameCamera(initial){ const box=new THREE.Box3().setFromObject(root), sph=box.getBoundingSphere(new THREE.Sphere());
  const nc=sph.center.clone(); camDist=sph.radius/Math.sin(THREE.MathUtils.degToRad(camera.fov/2))*0.95;
  let dir;
  if(initial){ dir=new THREE.Vector3(Math.sin(0.6)*0.8,0.42,Math.cos(0.6)*0.8).normalize(); }
  else { dir=camera.position.clone().sub(controls.target); if(dir.lengthSq()<1e-6) dir.set(Math.sin(0.6)*0.8,0.42,Math.cos(0.6)*0.8); dir.normalize(); }
  center=nc; controls.target.copy(center); controls.minDistance=sph.radius*0.5; controls.maxDistance=sph.radius*6;
  camera.position.copy(center).add(dir.multiplyScalar(camDist)); camera.lookAt(center); controls.update(); }

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.enablePan=false; controls.maxPolarAngle=Math.PI*0.495;
controls.addEventListener('start',()=>{ if(S.auto){S.auto=false; setV('rot',false);} });
build();

/* ============ панель керування ============ */
const body=document.getElementById('body');
function render(){
  const t=typeBy(S.type), dec=decorBy(S.decor), err=dimsErr();
  body.innerHTML=`
  <div class="sect"><h4>Тип виробу</h4>
    <div class="chips">${TYPES.map(x=>`<button class="chip ${S.type===x.id?'sel':''}" data-act="type" data-v="${x.id}">${x.name}</button>`).join('')}</div></div>
  <div class="sect"><h4>Вид</h4>
    <div class="optgrid">${VIDS.map(v=>`<button class="opt ${S.vid===v.id?'sel':''}" data-act="vid" data-v="${v.id}"><div class="t">${v.name}</div><div class="d">${v.desc}</div></button>`).join('')}</div></div>
  <div class="sect"><h4>Розміри</h4>
    <div class="fld"><div class="lab">Висота <span>${t.h} мм · фіксована типом</span></div><div class="ro">${t.h} мм</div></div>
    <div class="fld"><div class="lab">Глибина кабінки <span id="vDepth">${S.depth} мм</span></div>
      <div class="rng"><input type="range" min="${DEPTH_MIN}" max="${DEPTH_MAX}" step="10" value="${S.depth}" data-rng="depth">
        <input class="num" type="number" min="${DEPTH_MIN}" max="${DEPTH_MAX}" step="10" value="${S.depth}" data-num="depth"></div></div>
    <div class="fld"><div class="lab">Довжина фасаду <span id="vFacade">${S.facade} мм</span></div>
      <div class="rng"><input type="range" min="1100" max="8000" step="100" value="${S.facade}" data-rng="facade">
        <input class="num" type="number" min="1100" max="8000" step="100" value="${S.facade}" data-num="facade"></div></div>
  </div>
  <div class="sect"><h4>Двері · стандарт</h4>
    <div class="row2">
      <div>${stepper('nStd',S.nStd,0,12)}</div>
      <div class="chips">${[600,650,700].map(w=>`<button class="chip ${S.wStd===w?'sel':''}" data-act="wStd" data-v="${w}">${w}</button>`).join('')}</div>
    </div></div>
  <div class="sect"><h4>Двері · інклюзив</h4>
    <div class="row2">
      <div>${stepper('nInc',S.nInc,0,6)}</div>
      <div class="chips">${[900,1000].map(w=>`<button class="chip ${S.wInc===w?'sel':''}" data-act="wInc" data-v="${w}">${w}</button>`).join('')}</div>
    </div></div>
  <div class="sect"><h4>Перегородки</h4><div class="info">Автоматично за видом: <b id="partsN">${parts()} шт</b></div></div>
  <div class="sect"><h4>Декор (HPL Fundermax · FH)</h4>
    <div class="sws">${DECORS.map(d=>`<div class="sw ${S.decor===d.code?'sel':''}" data-act="decor" data-v="${d.code}">
      <div class="c" style="background:${d.hex}"></div><div class="n">${d.code}<span class="badge ${d.stock>0?'':'out'}">${d.stock>0?'є':'під зам.'}</span></div></div>`).join('')}</div></div>
  <div class="sect"><h4>Фурнітура</h4><div class="info">Виготовляється з: <b>${fitText(t)}</b>${t.fit.length>1?' — обидва матеріали.':'.'}</div></div>
  <div class="errmsg" id="dimsErrBox" role="alert" style="display:${err?'block':'none'}">${err}</div>`;
  // ціна
  const pv=document.getElementById('priceV'), pu=document.getElementById('priceU');
  const p=price(); pv.textContent=Math.round(p).toLocaleString('uk-UA')+' €';
  pu.textContent='≈ '+Math.round(p*SET.eurUah).toLocaleString('uk-UA')+' грн';
  pv.classList.remove('bump'); void pv.offsetWidth; pv.classList.add('bump');
  document.getElementById('orderBtn').disabled=!!err;
}
function stepper(k,v,min,max){ return `<div class="stepper"><button data-step="${k}" data-d="-1" data-min="${min}">−</button>
  <input data-num="${k}" type="number" value="${v}" min="${min}" max="${max}"><button data-step="${k}" data-d="1" data-max="${max}">+</button></div>`; }

/* події панелі (делегування) */
body.addEventListener('click',e=>{
  const a=e.target.closest('[data-act]'); if(a){ const k=a.dataset.act, v=a.dataset.v;
    if(k==='type'){ S.type=v; const t=typeBy(v); }
    else if(k==='vid') S.vid=v;
    else if(k==='wStd') S.wStd=+v; else if(k==='wInc') S.wInc=+v;
    else if(k==='decor'){ S.decor=v; colorTarget.set(decorBy(v).hex); render(); track('decor',{code:v}); return; }
    geomChanged(); return; }
  const st=e.target.closest('[data-step]'); if(st){ const k=st.dataset.step, d=+st.dataset.d;
    const min=+st.dataset.min, max=+st.dataset.max;
    S[k]=Math.max(isNaN(min)?0:min, Math.min(isNaN(max)?99:max, (S[k]||0)+d)); geomChanged(); }
});
body.addEventListener('input',e=>{
  const r=e.target.closest('[data-rng]'); const num=e.target.closest('[data-num]');
  if(r){ S[r.dataset.rng]=+r.value; const ni=body.querySelector(`[data-num="${r.dataset.rng}"]`); if(ni) ni.value=r.value;
    const lab=document.getElementById(r.dataset.rng==='depth'?'vDepth':'vFacade'); if(lab) lab.textContent=r.value+' мм'; geomLite(); }
  else if(num){ const k=num.dataset.num; S[k]=+num.value||0; const ri=body.querySelector(`[data-rng="${k}"]`); if(ri) ri.value=num.value; geomLite(); }
});
body.addEventListener('change',e=>{ const el=e.target.closest('[data-rng],[data-num]'); if(!el) return;
  S.depth=Math.max(DEPTH_MIN,Math.min(DEPTH_MAX,S.depth||DEPTH_MIN));
  S.facade=Math.max(1100,Math.min(8000,S.facade||1100));
  build(); render(); frameCamera(false); });
let rafQ=false;
function geomLite(){ if(!rafQ){ rafQ=true; requestAnimationFrame(()=>{ rafQ=false; build(); }); } livePrice(); updateLive(); }
function updateLive(){ const pn=document.getElementById('partsN'); if(pn) pn.textContent=parts()+' шт';
  const eb=document.getElementById('dimsErrBox'); if(eb){ const e=dimsErr(); eb.textContent=e; eb.style.display=e?'block':'none'; } }
function geomChanged(){ build(); render(); track('change',{type:S.type,vid:S.vid}); }
function livePrice(){ const pv=document.getElementById('priceV'),pu=document.getElementById('priceU'),p=price();
  pv.textContent=Math.round(p).toLocaleString('uk-UA')+' €'; pu.textContent='≈ '+Math.round(p*SET.eurUah).toLocaleString('uk-UA')+' грн';
  document.getElementById('orderBtn').disabled=!!dimsErr(); }

/* 3D-контролі */
const VIC={rot:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v4h-4"/>',doors:'<rect x="3" y="3" width="8" height="18" rx="1"/><path d="M13 6l8 3v9l-8 3z"/>',dims:'<path d="M3 6h18M3 6v3M21 6v3M6 14h12M6 14v3M18 14v3"/>',reset:'<path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/>'};
const vdefs=[['rot','Автообертання',()=>{S.auto=!S.auto;setV('rot',S.auto);}],['doors','Відкрити двері',()=>{S.doorsOpen=!S.doorsOpen;setV('doors',S.doorsOpen);}],['dims','Розміри',()=>{S.dims=!S.dims;build();setV('dims',S.dims);track('dims',{on:S.dims});}],['reset','Скинути вид',()=>frameCamera()]];
const vc=document.getElementById('vctrl');
vc.innerHTML=vdefs.map(d=>`<button class="vbtn" data-k="${d[0]}" aria-label="${d[1]}"><span class="tip">${d[1]}</span><svg viewBox="0 0 24 24">${VIC[d[0]]}</svg></button>`).join('');
vc.querySelectorAll('.vbtn').forEach((el,i)=>el.onclick=vdefs[i][2]);
function setV(k,on){ const el=vc.querySelector(`[data-k="${k}"]`); if(el) el.classList.toggle('on',on); }
setV('rot',true);

document.getElementById('resetBtn').onclick=()=>{ Object.assign(S,{type:'standart',vid:'кут',depth:1200,facade:4000,nStd:3,wStd:650,nInc:0,wInc:900,decor:'0077'}); colorTarget.set(decorBy('0077').hex); firstBuild=true; geomChanged(); };

/* ============ заявка ============ */
const SID='cfg'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
function track(ev,props){ try{ fetch(SB.url+'/rest/v1/budzirka_events',{method:'POST',keepalive:true,
  headers:{'Content-Type':'application/json','apikey':SB.key,'Authorization':'Bearer '+SB.key,'Prefer':'return=minimal'},
  body:JSON.stringify({session_id:SID,event:'cfg3d_'+ev,props:props||{}})}).catch(()=>{});}catch(e){} }
const modal=document.getElementById('modal');
document.getElementById('orderBtn').onclick=()=>{ if(dimsErr())return; modal.classList.add('show'); track('order_open',{}); };
window.closeModal=()=>modal.classList.remove('show');
modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
document.getElementById('mSend').onclick=async()=>{
  const name=document.getElementById('mName').value.trim(), phone=document.getElementById('mPhone').value.trim(), email=document.getElementById('mEmail').value.trim();
  const err=document.getElementById('mErr');
  if(!name||phone.replace(/\D/g,'').length<10){ err.style.display='block'; err.textContent="Вкажіть ім'я і коректний телефон."; return; }
  err.style.display='none';
  const t=typeBy(S.type),dec=decorBy(S.decor);
  const item={mod:'cabins',title:t.name,qty:1,unitBase:Math.round(price()),
    meta:`${VIDS.find(v=>v.id===S.vid).name} · фасад ${S.facade}×${S.depth} мм · двері ${S.nStd}×${S.wStd}${S.nInc?'+'+S.nInc+'×'+S.wInc+' інкл.':''} · ${dec.code} ${dec.name} · ${area().toFixed(2)} м²`};
  try{
    await fetch(SB.url+'/rest/v1/budzirka_leads',{method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB.key,'Authorization':'Bearer '+SB.key,'Prefer':'return=minimal'},
      body:JSON.stringify({session_id:SID,name,phone,email:email||null,total_eur:Math.round(price()),estimate:[item],
        price_cat:'Прайс 1',quote_number:'3D-'+new Date().getFullYear()+'/'+Math.floor(Math.random()*9000+1000),source:'3d-config'})});
    track('order_sent',{total:Math.round(price())});
    closeModal(); toast('Заявку надіслано ✓ Менеджер звʼяжеться найближчим часом');
  }catch(e){ err.style.display='block'; err.textContent='Помилка надсилання. Спробуйте ще раз.'; }
};
let toastT=null; function toast(m){ const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),3200); }

/* ============ каталог із бази ============ */
(async()=>{ try{
  const h={apikey:SB.key,Authorization:'Bearer '+SB.key};
  const [t,d,st]=await Promise.all([
    fetch(SB.url+'/rest/v1/budzirka_cabin_types?select=*&active=eq.true&order=sort',{headers:h}).then(r=>r.json()),
    fetch(SB.url+'/rest/v1/budzirka_decors?select=*&dir=eq.cabins&active=eq.true&order=code',{headers:h}).then(r=>r.json()),
    fetch(SB.url+'/rest/v1/budzirka_settings?select=*&id=eq.1',{headers:h}).then(r=>r.json()),
  ]);
  if(Array.isArray(t)&&t.length) TYPES=t.filter(x=>x.rooms!==false).map(x=>({id:x.id,name:x.name,h:x.h||2100,fit:String(x.fit||'inox').split(',').map(s=>s.trim()).filter(Boolean),rail:x.id==='standart'||x.id==='tube'||x.id==='kids'||x.id==='comb'||x.id==='inclusive'}));
  if(Array.isArray(d)&&d.length) DECORS=d.map(x=>({code:x.code,name:x.name||x.code,hex:x.hex||'#9aa3a8',stock:+x.stock||0}));
  const s=Array.isArray(st)&&st[0]; if(s){ SET.rate=+s.rate_per_m2||170; SET.eurUah=+s.eur_uah||52.06; }
  if(!typeBy(S.type)&&TYPES[0]) S.type=TYPES[0].id;
  if(!DECORS.find(x=>x.code===S.decor)&&DECORS[0]){ S.decor=DECORS[0].code; colorTarget.set(DECORS[0].hex); }
}catch(e){} render(); }) ();

/* ============ цикл ============ */
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); labelR.setSize(innerWidth,innerHeight); });
function loop(){ requestAnimationFrame(loop);
  decorMat.color.lerp(colorTarget,0.16);
  const tgt=S.doorsOpen?-1.15:0; doorPivots.forEach(p=>{ p.rotation.y+=(tgt-p.rotation.y)*0.14; });
  if(S.auto){ const t=Date.now()*0.00016; camera.position.x=center.x+Math.sin(t)*camDist*0.8; camera.position.z=center.z+Math.cos(t)*camDist*0.8; camera.position.y=center.y+camDist*0.42; camera.lookAt(center); }
  controls.update(); renderer.render(scene,camera); labelR.render(scene,camera);
}
render(); loop();
requestAnimationFrame(()=>requestAnimationFrame(()=>{ window.__ready=true; const l=document.getElementById('loader'); if(l){ l.classList.add('hide'); setTimeout(()=>l.remove(),700); } track('loaded',{}); }));
</script>
</body>
</html>
